<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RectPlacer — アートボード配置ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --surface2: #231f2e;
    --border: #332d42;
    --accent: #c8ff57;
    --accent2: #7b5ea7;
    --text: #e8e4f0;
    --muted: #7a7488;
    --danger: #ff5757;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  #app { display: flex; height: 100vh; width: 100vw; }

  /* ── SIDEBAR (compact) ── */
  #sidebar {
    width: 200px; min-width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 8px 10px 7px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 6px;
  }
  #sidebar-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 13px;
    color: var(--accent); letter-spacing: -.3px;
  }
  #sidebar-header p { font-size: 9px; color: var(--muted); }

  /* RECT LIST */
  #rect-list-wrap { flex: 1; overflow-y: auto; padding: 6px; }
  #rect-list-wrap::-webkit-scrollbar { width: 3px; }
  #rect-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .group-header {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 2px 3px;
    margin-top: 6px;
    border-bottom: 1.5px solid;
  }
  .group-header:first-child { margin-top: 2px; }
  .group-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; border: 1.5px solid; }
  .group-name { font-size: 9px; font-weight: 600; letter-spacing: .5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .rect-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; margin-bottom: 2px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: grab;
    transition: border-color .12s;
    user-select: none;
  }
  .rect-item:hover { background: #2a2538; }
  .rect-item.placed { opacity: .55; }
  .rect-color-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; border: 1px solid; }
  .rect-item-info { flex: 1; min-width: 0; }
  .rect-item-name { font-size: 9px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rect-item-dims { font-size: 8px; color: var(--muted); }
  .placed-badge { font-size: 7px; padding: 1px 4px; color: #fff; border-radius: 8px; letter-spacing: .3px; flex-shrink:0; }

  /* SIDEBAR BOTTOM */
  #sidebar-bottom {
    border-top: 1px solid var(--border);
    padding: 7px;
    display: flex; flex-direction: column; gap: 5px;
  }
  #csv-label {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 5px 8px; border-radius: 5px;
    font-size: 9px; border: 1px dashed var(--border);
    cursor: pointer; transition: all .12s; color: var(--muted);
  }
  #csv-label:hover { border-color: var(--accent); color: var(--accent); }
  #csv-input { display: none; }
  .btn-row { display: flex; gap: 5px; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 5px 8px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: 9px;
    border: 1px solid var(--border);
    cursor: pointer; transition: all .12s;
    background: var(--surface2); color: var(--text); white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.accent { background: var(--accent); color: #0f0e11; border-color: var(--accent); font-weight: 700; }
  .btn.accent:hover { background: #aadd44; }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── CANVAS AREA ── */
  #canvas-area {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg); overflow: hidden; position: relative;
    min-width: 0;
  }

  /* TOOLBAR (compact) */
  #toolbar {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 5px 10px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .tbar-label { font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .tbar-unit  { font-size: 8px; color: var(--muted); }
  #toolbar input[type=number] {
    width: 58px; padding: 3px 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 3px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 10px;
  }
  #toolbar input[type=number]:focus { outline: none; border-color: var(--accent); }
  .sep { width: 1px; height: 14px; background: var(--border); margin: 0 2px; }

  /* ── VIEWPORT (auto-fit) ── */
  #viewport {
    flex: 1; overflow: auto; position: relative;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 20px 0;
  }
  #viewport::-webkit-scrollbar { width: 5px; height: 5px; }
  #viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* boards-wrap: 複数アートボードを縦に並べる */
  #boards-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 32px;
    padding: 12px 32px 32px;
  }

  /* 各アートボード+ラベルのコンテナ */
  .board-container {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .board-label {
    font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }

  /* scene: padding gives space around artboard */
  .scene {
    position: relative;
    flex-shrink: 0;
  }

  /* artboard */
  .artboard {
    position: relative;
    background: #ffffff;
    outline: 1px solid #999999;
    box-shadow: 0 0 0 1px #cccccc, 0 6px 32px rgba(0,0,0,.55);
  }

  /* PLACED RECTS */
  .placed-rect {
    position: absolute;
    border: 2px solid transparent;
    border-radius: 1px;
    cursor: grab;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    transition: box-shadow .1s;
    user-select: none;
  }
  .placed-rect:hover { z-index: 50 !important; box-shadow: 0 0 0 2px var(--accent); }
  .placed-rect.selected { box-shadow: 0 0 0 2px var(--accent) !important; z-index: 100 !important; }
  .placed-rect.dragging { opacity: .85; cursor: grabbing; z-index: 200 !important; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
  .placed-rect.collision { box-shadow: 0 0 0 2px var(--danger) !important; }
  .rect-label {
    font-size: 7px; font-family: 'DM Mono', monospace;
    color: rgba(0,0,0,.6); pointer-events: none;
    text-align: center; padding: 1px 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  /* GHOST */
  #ghost-rect {
    position: fixed; pointer-events: none;
    background: rgba(200,255,87,.2);
    border: 1.5px solid var(--accent);
    border-radius: 1px;
    display: none; z-index: 9999;
  }

  /* ROTATE BTN */
  #rotate-btn {
    position: fixed; z-index: 500; display: none;
    background: var(--accent); color: #0f0e11;
    border: none; border-radius: 50%;
    width: 26px; height: 26px; font-size: 12px;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.5);
    align-items: center; justify-content: center;
    transition: transform .12s;
  }
  #rotate-btn:hover { transform: scale(1.1) rotate(20deg); }
  #rotate-btn.visible { display: flex; }

  /* AREA BADGE (right-bottom) */
  #area-badge {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    z-index: 300; pointer-events: none;
    min-width: 160px;
  }
  .ab-label { font-size: 7px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }

  /* EMPTY HINT */
  #empty-hint {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; color: var(--muted); gap: 6px; font-size: 10px;
  }
  #empty-hint .icon { font-size: 24px; opacity: .3; }

  /* EXPORT MODAL */
  #export-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #export-modal.open { display: flex; }
  #export-dialog {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 22px; min-width: 320px;
  }
  #export-dialog h2 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .form-group select, .form-group input[type=text] {
    width: 100%; padding: 6px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 11px;
  }
  .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 16px; font-size: 10px;
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 2000; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>RectPlacer</h1>
      <p>配置ツール</p>
    </div>

    <div id="rect-list-wrap">
      <div id="rect-list"></div>
    </div>

    <div id="sidebar-bottom">
      <label id="csv-label" for="csv-input">
        <span>📂</span> CSV読み込み
      </label>
      <input type="file" id="csv-input" accept=".csv,text/csv">
      <div class="btn-row">
        <button class="btn danger" id="clear-btn" style="flex:1">🗑</button>
        <button class="btn accent" id="export-btn" style="flex:2">↑ 書き出し</button>
      </div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <div id="toolbar">
      <span class="tbar-label">AB</span>
      <input type="number" id="ab-w" value="1088" min="1" max="10000" step="0.1">
      <span class="tbar-unit">×</span>
      <input type="number" id="ab-h" value="738" min="1" max="10000" step="0.1">
      <span class="tbar-unit">mm</span>
      <button class="btn" id="apply-ab-btn" style="padding:3px 8px">適用</button>
      <div class="sep"></div>
      <span class="tbar-label">SNAP</span>
      <input type="number" id="snap-dist" value="5" min="0" max="50" step="0.5" style="width:44px">
      <span class="tbar-unit">mm</span>
      <div class="sep"></div>
      <button class="btn" id="rotate-selected-btn" style="padding:3px 8px">↻ 回転</button>
      <div class="sep"></div>
      <button class="btn" id="auto-place-btn" style="padding:3px 10px;background:#2a2538;border-color:#7b5ea7;color:#c8b8ff;font-weight:600">⚡ 自動配置</button>
    </div>

    <div id="viewport">
      <div id="boards-wrap">
        <!-- アートボードは動的に生成 -->
      </div>
    </div>
  </div>

</div>

<!-- ROTATE FLOATING BTN -->
<button id="rotate-btn" title="90°回転">↻</button>

<!-- AREA FLOATING BADGE -->
<div id="area-badge">
  <div class="ab-label">配置面積（BBox）</div>
  <div id="badge-groups"></div>
</div>

<!-- GHOST -->
<div id="ghost-rect"></div>

<!-- EXPORT MODAL -->
<div id="export-modal">
  <div id="export-dialog">
    <h2>エクスポート設定</h2>
    <div class="form-group">
      <label>ファイル名</label>
      <input type="text" id="export-name" value="artboard">
    </div>
    <div class="form-group">
      <label>フォーマット</label>
      <select id="export-fmt">
        <option value="svg">SVG</option>
        <option value="ai">AI (SVG ベース)</option>
      </select>
    </div>
    <div class="form-group">
      <label>単位</label>
      <select id="export-unit">
        <option value="mm" selected>mm</option>
        <option value="pt">pt</option>
        <option value="px">px</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" id="cancel-export" style="flex:1">キャンセル</button>
      <button class="btn accent" id="do-export" style="flex:1">ダウンロード</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   UNIT SYSTEM
   Internal unit = mm. scale is computed dynamically per viewport.
═══════════════════════════════════════════════════════ */
function roundMm(v, decimals=2) { return Math.round(v * 10**decimals) / 10**decimals; }

/* ═══════════════════════════════════════════════════════
   STATE  (all coordinates/sizes in mm)
═══════════════════════════════════════════════════════ */
let csvGroups = [];  // { id, fileName, fill, border }
let rects = [];     // { id, groupId, name, w, h, fill, border }

// boards: 複数アートボード
// placed items now belong to a board
let boards = [];    // { id, placed:[] }  placed: { id, rectId, groupId, x, y, w, h, fill, border, name }
let currentBoardId = 1;
let nextBoardId = 1;

// legacy flat accessor for collision etc (active board)
function getPlaced(boardId) {
  const b = boards.find(b => b.id === boardId);
  return b ? b.placed : [];
}
function allPlaced() { return boards.flatMap(b => b.placed); }

let selectedId = null;
let selectedBoardId = null;
let artboardW = 1088, artboardH = 738;  // mm
let snapDist = 5;   // mm
let nextPlacedId = 1;
let nextGroupId = 1;

const GROUP_PALETTE = [
  { fill: '#ffc2c2', border: '#c03030' },
  { fill: '#b8d4ff', border: '#2a60c0' },
  { fill: '#b8f5c0', border: '#208a38' },
  { fill: '#fff0a0', border: '#b08000' },
  { fill: '#e0c0ff', border: '#8030c0' },
  { fill: '#ffd0a0', border: '#c05010' },
  { fill: '#a8f0f8', border: '#0880a0' },
  { fill: '#ffb8e0', border: '#c0208a' },
  { fill: '#c8f0a0', border: '#407820' },
  { fill: '#c0c8ff', border: '#2030a8' },
];
let groupPaletteIdx = 0;
function nextGroupPalette() { return GROUP_PALETTE[groupPaletteIdx++ % GROUP_PALETTE.length]; }

/* ═══════════════════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════════════════ */
const boardsWrap = document.getElementById('boards-wrap');
const rectListEl = document.getElementById('rect-list');
const rotateBtn  = document.getElementById('rotate-btn');
const ghostEl    = document.getElementById('ghost-rect');
const viewport   = document.getElementById('viewport');

/* ═══════════════════════════════════════════════════════
   ARTBOARD SETUP  —  auto-fit scale
═══════════════════════════════════════════════════════ */
let scale = 1;

function calcScale() {
  const pad = 80;
  const vw = viewport.clientWidth  - pad;
  const vh = viewport.clientHeight - pad;
  return Math.min(vw / artboardW, vh / artboardH, 2);
}

function mmToPx(mm) { return mm * scale; }
function pxToMm(px) { return px / scale; }

function ensureBoard(boardId) {
  if (!boards.find(b => b.id === boardId)) {
    boards.push({ id: boardId, placed: [] });
  }
  return boards.find(b => b.id === boardId);
}

function getBoardEl(boardId) {
  return document.getElementById('artboard-' + boardId);
}

function renderAllBoards() {
  scale = calcScale();
  boardsWrap.innerHTML = '';

  if (!boards.length) {
    // Show empty state on a single blank board
    const wPx = mmToPx(artboardW), hPx = mmToPx(artboardH);
    boardsWrap.innerHTML = `
      <div class="board-container">
        <div class="board-label">アートボード 1</div>
        <div class="scene" style="width:${wPx}px;height:${hPx}px">
          <div class="artboard" id="artboard-empty" style="width:${wPx}px;height:${hPx}px">
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;gap:8px;font-size:11px;pointer-events:none">
              <div style="font-size:28px;opacity:.3">⬜</div>
              <div>CSVを読み込んで矩形をドラッグまたは自動配置</div>
            </div>
          </div>
        </div>
      </div>`;
    return;
  }

  boards.forEach((board, idx) => {
    const wPx = mmToPx(artboardW), hPx = mmToPx(artboardH);
    const container = document.createElement('div');
    container.className = 'board-container';
    container.innerHTML = `
      <div class="board-label">アートボード ${idx + 1}</div>
      <div class="scene" style="width:${wPx}px;height:${hPx}px">
        <div class="artboard" id="artboard-${board.id}" style="width:${wPx}px;height:${hPx}px"></div>
      </div>`;
    boardsWrap.appendChild(container);

    const abEl = container.querySelector('.artboard');
    abEl.addEventListener('mousedown', e => {
      if (e.target === abEl) selectRect(null, null);
    });

    board.placed.forEach(p => renderPlacedRect(p, board.id));
  });
}

const resizeObs = new ResizeObserver(() => renderAllBoards());
resizeObs.observe(viewport);

document.getElementById('apply-ab-btn').onclick = () => {
  artboardW = parseFloat(document.getElementById('ab-w').value) || 1088;
  artboardH = parseFloat(document.getElementById('ab-h').value) || 738;
  renderAllBoards();
};
document.getElementById('snap-dist').onchange = e => { snapDist = parseFloat(e.target.value) || 5; };

/* ═══════════════════════════════════════════════════════
   CSV IMPORT  (quoted CSV, cols: 0=フォルダ,1=ファイル名,2=レイヤー,
               3=番号,4=種類,5=横mm,6=縦mm,7=横pt,8=縦pt)
═══════════════════════════════════════════════════════ */
function parseQuotedCSV(text) {
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur);
    rows.push(cols.map(s => s.trim()));
  }
  return rows;
}

function loadCsvText(text, fileName) {
  const rows = parseQuotedCSV(text);
  if (!rows.length) return 0;

  const pal = nextGroupPalette();
  const group = { id: nextGroupId++, fileName, fill: pal.fill, border: pal.border };
  csvGroups.push(group);

  let loaded = 0;
  for (let i = 0; i < rows.length; i++) {
    const cols = rows[i];
    if (cols.length < 7) continue;
    // Skip header row (col[5] is not a number)
    if (isNaN(parseFloat(cols[5]))) continue;
    // Skip "オブジェクトなし" rows
    if ((cols[4] || '').includes('なし')) continue;
    const w = parseFloat(cols[5]);
    const h = parseFloat(cols[6]);
    if (isNaN(w) || isNaN(h) || w <= 0 || h <= 0) continue;
    // Name: ファイル名(URL-decoded, .ai除去) + "#" + オブジェクト番号
    let baseName = (cols[1] || '');
    try { baseName = decodeURIComponent(baseName); } catch(e) {}
    baseName = baseName.replace(/\.ai$/i, '');
    const objNum = cols[3] || String(loaded + 1);
    const name = `${baseName}#${objNum}`;
    rects.push({
      id: Date.now() + Math.random(),
      groupId: group.id,
      name, w: roundMm(w), h: roundMm(h),
      fill: group.fill, border: group.border
    });
    loaded++;
  }
  return loaded;
}

document.getElementById('csv-input').onchange = function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const loaded = loadCsvText(ev.target.result, file.name);
    renderSidebar();
    updateStats();
    if (loaded > 0) {
      showToast(`「${file.name}」から ${loaded} 個の矩形を読み込みました`);
      emptyHint.style.display = 'none';
    } else {
      showToast(`⚠ 「${file.name}」から矩形データが見つかりませんでした`);
    }
  };
  reader.readAsText(file, 'UTF-8');
  this.value = '';
};

function renderSidebar() {
  rectListEl.innerHTML = '';
  if (!rects.length) {
    rectListEl.innerHTML = '<div style="font-size:9px;color:var(--muted);padding:6px 2px">CSVを読み込んでください</div>';
    return;
  }

  csvGroups.forEach(grp => {
    const groupRects = rects.filter(r => r.groupId === grp.id);
    if (!groupRects.length) return;

    // 8桁コードのみ抽出 (先頭の数字列 or ファイル名から)
    const codeMatch = grp.fileName.match(/\d{8}/);
    const displayName = codeMatch ? codeMatch[0] : grp.fileName.replace(/\.csv$/i, '');

    const header = document.createElement('div');
    header.className = 'group-header';
    header.style.borderColor = grp.border;
    header.innerHTML = `
      <div class="group-dot" style="background:${grp.fill};border-color:${grp.border}"></div>
      <span class="group-name" style="color:${grp.border}">${displayName}</span>
    `;
    rectListEl.appendChild(header);

    groupRects.forEach(r => {
      const isPlaced = allPlaced().some(p => p.rectId === r.id);
      const div = document.createElement('div');
      div.className = 'rect-item' + (isPlaced ? ' placed' : '');
      div.style.borderColor = isPlaced ? grp.border + '44' : grp.border + '99';
      div.innerHTML = `
        <div class="rect-color-swatch" style="background:${grp.fill};border-color:${grp.border}"></div>
        <div class="rect-item-info">
          <div class="rect-item-name">#${r.name.split('#')[1] || r.name}</div>
          <div class="rect-item-dims">${r.w}×${r.h}mm</div>
        </div>
        ${isPlaced ? `<span class="placed-badge" style="background:${grp.border}">✓</span>` : ''}
      `;
      div.addEventListener('mousedown', e => startListDrag(e, r));
      rectListEl.appendChild(div);
    });
  });
}

/* ═══════════════════════════════════════════════════════
   STATS UPDATE
   面積 = グループごとの配置済み矩形群のバウンディングボックス面積
═══════════════════════════════════════════════════════ */
function calcGroupBbox(groupId) {
  const ps = allPlaced().filter(p => p.groupId === groupId);
  if (!ps.length) return null;
  const minX = Math.min(...ps.map(p => p.x));
  const minY = Math.min(...ps.map(p => p.y));
  const maxX = Math.max(...ps.map(p => p.x + p.w));
  const maxY = Math.max(...ps.map(p => p.y + p.h));
  return { w: maxX - minX, h: maxY - minY, area: (maxX - minX) * (maxY - minY) };
}

function updateStats() {
  const badgeGroups = document.getElementById('badge-groups');
  if (!badgeGroups) return;
  const ap = allPlaced();
  if (!csvGroups.length || !ap.length) {
    badgeGroups.innerHTML = '<div style="font-size:9px;color:var(--muted)">矩形未配置</div>';
    return;
  }
  let html = '';
  csvGroups.forEach(grp => {
    const bbox = calcGroupBbox(grp.id);
    const gPlaced = ap.filter(p => p.groupId === grp.id).length;
    const gTotal  = rects.filter(r => r.groupId === grp.id).length;
    if (!gTotal) return;
    const areaStr = bbox ? Math.round(bbox.area).toLocaleString('ja-JP') : '—';
    const wStr    = bbox ? bbox.w.toFixed(1) : '—';
    const hStr    = bbox ? bbox.h.toFixed(1) : '—';
    const codeMatch = grp.fileName.match(/\d{8}/);
    const label = codeMatch ? codeMatch[0] : grp.fileName.replace(/\.csv$/i,'');
    html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <div style="width:7px;height:7px;border-radius:1px;background:${grp.fill};border:1.5px solid ${grp.border};flex-shrink:0"></div>
      <span style="font-size:9px;color:var(--muted);flex:1">${label} ${gPlaced}/${gTotal}</span>
      <span style="font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:${grp.border}">${areaStr}</span>
    </div>
    <div style="font-size:8px;color:var(--muted);margin-bottom:6px;padding-left:13px">${wStr}×${hStr} mm²</div>`;
  });
  badgeGroups.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   COLLISION & BOUNDS
═══════════════════════════════════════════════════════ */
function rectsOverlap(a, b) {
  return !(a.x + a.w <= b.x || b.x + b.w <= a.x ||
           a.y + a.h <= b.y || b.y + b.h <= a.y);
}

function hasCollision(candidate, boardId, excludeId = null) {
  for (const p of getPlaced(boardId)) {
    if (p.id === excludeId) continue;
    if (rectsOverlap(candidate, p)) return true;
  }
  return false;
}

function isInBounds(r) {
  return r.x >= 0 && r.y >= 0 && r.x + r.w <= artboardW && r.y + r.h <= artboardH;
}

/* ═══════════════════════════════════════════════════════
   SNAP TO CORNERS
═══════════════════════════════════════════════════════ */
function snapToCorners(candidate, boardId, excludeId = null) {
  let best = null, bestDist = Infinity;
  const candCorners = [
    { dx: 0,           dy: 0 },
    { dx: -candidate.w, dy: 0 },
    { dx: 0,           dy: -candidate.h },
    { dx: -candidate.w, dy: -candidate.h },
  ];
  for (const p of getPlaced(boardId)) {
    if (p.id === excludeId) continue;
    const pCorners = [
      { x: p.x,       y: p.y },
      { x: p.x + p.w, y: p.y },
      { x: p.x,       y: p.y + p.h },
      { x: p.x + p.w, y: p.y + p.h },
    ];
    for (const pc of pCorners) {
      for (const cc of candCorners) {
        const nx = pc.x + cc.dx, ny = pc.y + cc.dy;
        const dist = Math.hypot(candidate.x - nx, candidate.y - ny);
        if (dist < snapDist && dist < bestDist) {
          const snapped = { ...candidate, x: nx, y: ny };
          if (!hasCollision(snapped, boardId, excludeId) && isInBounds(snapped)) {
            best = { x: nx, y: ny }; bestDist = dist;
          }
        }
      }
    }
  }
  return best;
}

/* ═══════════════════════════════════════════════════════
   RENDER PLACED RECT
═══════════════════════════════════════════════════════ */
function renderPlacedRect(p, boardId) {
  const abEl = getBoardEl(boardId);
  if (!abEl) return;
  let el = document.getElementById('placed-' + p.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'placed-' + p.id;
    el.className = 'placed-rect';
    el.dataset.boardId = boardId;
    const num = p.name.split('#')[1] || p.name;
    el.innerHTML = `<span class="rect-label">#${num}</span>`;
    abEl.appendChild(el);
    el.addEventListener('mousedown', e => startBoardDrag(e, p.id, boardId));
  }
  el.style.left        = mmToPx(p.x) + 'px';
  el.style.top         = mmToPx(p.y) + 'px';
  el.style.width       = mmToPx(p.w) + 'px';
  el.style.height      = mmToPx(p.h) + 'px';
  el.style.background  = p.fill;
  el.style.borderColor = p.border;
}

function removePlacedEl(id) {
  const el = document.getElementById('placed-' + id);
  if (el) el.remove();
}

/* ═══════════════════════════════════════════════════════
   SELECT
═══════════════════════════════════════════════════════ */
function selectRect(id, boardId) {
  if (selectedId) {
    const old = document.getElementById('placed-' + selectedId);
    if (old) old.classList.remove('selected');
  }
  selectedId = id; selectedBoardId = boardId;
  if (id) {
    const el = document.getElementById('placed-' + id);
    if (el) { el.classList.add('selected'); showRotateBtn(el); }
  } else { hideRotateBtn(); }
}

function showRotateBtn(el) {
  if (!el) return;
  const r = el.getBoundingClientRect();
  rotateBtn.style.left = (r.right - 13) + 'px';
  rotateBtn.style.top  = (r.top   - 13) + 'px';
  rotateBtn.classList.add('visible');
}
function hideRotateBtn() { rotateBtn.classList.remove('visible'); }

rotateBtn.onclick = () => { if (selectedId) rotateRect(selectedId, selectedBoardId); };
document.getElementById('rotate-selected-btn').onclick = () => {
  if (selectedId) rotateRect(selectedId, selectedBoardId);
};

/* ═══════════════════════════════════════════════════════
   ROTATE
═══════════════════════════════════════════════════════ */
function rotateRect(id, boardId) {
  const board = boards.find(b => b.id === boardId); if (!board) return;
  const p = board.placed.find(p => p.id === id);    if (!p) return;
  const nw = p.h, nh = p.w;
  const nx = Math.min(p.x, artboardW - nw);
  const ny = Math.min(p.y, artboardH - nh);
  if (nx < 0 || ny < 0) { showToast('回転後にアートボードからはみ出します'); return; }
  if (hasCollision({ x: nx, y: ny, w: nw, h: nh }, boardId, id)) {
    showToast('⚠ 回転後に他の矩形と重なります'); return;
  }
  p.w = nw; p.h = nh; p.x = nx; p.y = ny;
  renderPlacedRect(p, boardId);
  updateStats();
  const el = document.getElementById('placed-' + id);
  if (el) showRotateBtn(el);
}

/* ═══════════════════════════════════════════════════════
   DRAG FROM SIDEBAR
═══════════════════════════════════════════════════════ */
let listDragState = null;

function startListDrag(e, rect) {
  e.preventDefault();
  ghostEl.style.display = 'block';
  ghostEl.style.width  = mmToPx(rect.w) + 'px';
  ghostEl.style.height = mmToPx(rect.h) + 'px';
  ghostEl.style.left = (e.clientX - mmToPx(rect.w)/2) + 'px';
  ghostEl.style.top  = (e.clientY - mmToPx(rect.h)/2) + 'px';
  listDragState = { rect };
  document.addEventListener('mousemove', onListDragMove);
  document.addEventListener('mouseup', onListDragUp);
}
function onListDragMove(e) {
  if (!listDragState) return;
  const r = listDragState.rect;
  ghostEl.style.left = (e.clientX - mmToPx(r.w)/2) + 'px';
  ghostEl.style.top  = (e.clientY - mmToPx(r.h)/2) + 'px';
}
function onListDragUp(e) {
  document.removeEventListener('mousemove', onListDragMove);
  document.removeEventListener('mouseup', onListDragUp);
  ghostEl.style.display = 'none';
  const r = listDragState.rect; listDragState = null;

  // First ensure at least one board exists
  if (!boards.length) { ensureBoard(nextBoardId); renderAllBoards(); }

  for (const board of boards) {
    const abEl = getBoardEl(board.id); if (!abEl) continue;
    const abRect = abEl.getBoundingClientRect();
    if (e.clientX < abRect.left || e.clientX > abRect.right ||
        e.clientY < abRect.top  || e.clientY > abRect.bottom) continue;
    let x = roundMm(pxToMm(e.clientX - abRect.left - mmToPx(r.w)/2));
    let y = roundMm(pxToMm(e.clientY - abRect.top  - mmToPx(r.h)/2));
    x = Math.max(0, Math.min(artboardW - r.w, x));
    y = Math.max(0, Math.min(artboardH - r.h, y));
    const snap = snapToCorners({ x, y, w: r.w, h: r.h }, board.id);
    if (snap) { x = snap.x; y = snap.y; }
    if (hasCollision({ x, y, w: r.w, h: r.h }, board.id)) showToast('⚠ 他の矩形と重なっています');
    const pid = nextPlacedId++;
    const p = { id: pid, rectId: r.id, groupId: r.groupId, x, y, w: r.w, h: r.h, fill: r.fill, border: r.border, name: r.name };
    board.placed.push(p);
    renderPlacedRect(p, board.id);
    renderSidebar(); updateStats();
    selectRect(pid, board.id);
    return;
  }
  showToast('アートボード上にドロップしてください');
}

/* ═══════════════════════════════════════════════════════
   DRAG ON ARTBOARD
═══════════════════════════════════════════════════════ */
let boardDragState = null;

function startBoardDrag(e, id, boardId) {
  e.preventDefault(); e.stopPropagation();
  selectRect(id, boardId);
  const board = boards.find(b => b.id === boardId); if (!board) return;
  const p = board.placed.find(p => p.id === id);    if (!p) return;
  const abEl = getBoardEl(boardId);
  const abRect = abEl.getBoundingClientRect();
  boardDragState = {
    id, boardId,
    offsetX: pxToMm(e.clientX - abRect.left) - p.x,
    offsetY: pxToMm(e.clientY - abRect.top)  - p.y,
    origX: p.x, origY: p.y
  };
  document.getElementById('placed-' + id).classList.add('dragging');
  hideRotateBtn();
  document.addEventListener('mousemove', onBoardDragMove);
  document.addEventListener('mouseup',   onBoardDragUp);
}
function onBoardDragMove(e) {
  if (!boardDragState) return;
  const { id, boardId, offsetX, offsetY } = boardDragState;
  const board = boards.find(b => b.id === boardId); if (!board) return;
  const p = board.placed.find(p => p.id === id);    if (!p) return;
  const abEl = getBoardEl(boardId);
  const abRect = abEl.getBoundingClientRect();
  let x = roundMm(pxToMm(e.clientX - abRect.left) - offsetX);
  let y = roundMm(pxToMm(e.clientY - abRect.top)  - offsetY);
  x = Math.max(0, Math.min(artboardW - p.w, x));
  y = Math.max(0, Math.min(artboardH - p.h, y));
  const snap = snapToCorners({ x, y, w: p.w, h: p.h }, boardId, id);
  if (snap) { x = snap.x; y = snap.y; }
  p.x = x; p.y = y;
  const el = document.getElementById('placed-' + id);
  el.style.left = mmToPx(x) + 'px';
  el.style.top  = mmToPx(y) + 'px';
  el.classList.toggle('collision', hasCollision({ x, y, w: p.w, h: p.h }, boardId, id));
}
function onBoardDragUp() {
  document.removeEventListener('mousemove', onBoardDragMove);
  document.removeEventListener('mouseup',   onBoardDragUp);
  if (!boardDragState) return;
  const { id, boardId } = boardDragState;
  const board = boards.find(b => b.id === boardId);
  const p = board && board.placed.find(p => p.id === id);
  const el = document.getElementById('placed-' + id);
  if (el) {
    el.classList.remove('dragging', 'collision');
    if (p && hasCollision({ x: p.x, y: p.y, w: p.w, h: p.h }, boardId, id)) {
      p.x = boardDragState.origX; p.y = boardDragState.origY;
      el.style.left = mmToPx(p.x) + 'px';
      el.style.top  = mmToPx(p.y) + 'px';
      showToast('⚠ 他の矩形と重なるため元の位置に戻しました');
    }
    showRotateBtn(el);
  }
  boardDragState = null;
}

/* ═══════════════════════════════════════════════════════
   AUTO PLACE ENGINE
   ─ CSV順に優先（csvGroups[0]が最優先）
   ─ 各グループ内は面積降順
   ─ Skyline BL アルゴリズムで左上詰め
   ─ グループ間はY境界でスパッと切り、下に継続配置
   ─ アートボードに入りきらない場合は次ページ
═══════════════════════════════════════════════════════ */
document.getElementById('auto-place-btn').onclick = autoPlace;

function autoPlace() {
  if (!rects.length) { showToast('CSVを読み込んでください'); return; }

  // Clear existing placed
  allPlaced().forEach(p => removePlacedEl(p.id));
  boards = [];
  nextPlacedId = 1;
  nextBoardId  = 1;

  // Sort each group by area desc
  const groups = csvGroups.map(grp => ({
    grp,
    items: rects
      .filter(r => r.groupId === grp.id)
      .map(r => ({ ...r }))
      .sort((a, b) => (b.w * b.h) - (a.w * a.h))
  }));

  let boardId = nextBoardId++;
  ensureBoard(boardId);
  let groupBoundaryY = 0; // Y以下にCSV2以降を配置

  for (let gi = 0; gi < groups.length; gi++) {
    const { items } = groups[gi];
    const startY = gi === 0 ? 0 : groupBoundaryY;

    for (const item of items) {
      // Try to place on current or subsequent boards
      let placed = false;
      for (let bi = boards.findIndex(b => b.id === boardId); bi < boards.length + 10; bi++) {
        // extend boards array if needed
        while (bi >= boards.length) {
          boardId = nextBoardId++;
          ensureBoard(boardId);
        }
        const board = boards[bi];
        const sy = gi === 0 ? 0 : (board.id === boards.find(b => b.id === boardId)?.id ? startY : 0);
        const pos = findPosition(item, board.placed, sy);
        if (pos) {
          const pid = nextPlacedId++;
          const p = { id: pid, rectId: item.id, groupId: item.groupId,
                      x: pos.x, y: pos.y, w: item.w, h: item.h,
                      fill: item.fill, border: item.border, name: item.name };
          board.placed.push(p);
          placed = true;
          // Update current boardId pointer to this board
          boardId = board.id;
          break;
        }
        // Move to next board
        boardId = boards[bi + 1]?.id ?? nextBoardId;
      }
      if (!placed) showToast(`⚠ "${item.name}" を配置できませんでした`);
    }

    // After placing CSV group 0: record max Y as boundary for next group
    if (gi === 0) {
      const ps = boards.flatMap(b => b.placed).filter(p => p.groupId === groups[0].grp.id);
      groupBoundaryY = ps.length ? Math.max(...ps.map(p => p.y + p.h)) : 0;
      // reset to first board for next group, place below boundary
      boardId = boards[0].id;
    }
  }

  renderAllBoards();
  renderSidebar();
  updateStats();
  const total = boards.reduce((s, b) => s + b.placed.length, 0);
  showToast(`⚡ 自動配置完了 — ${total}個を${boards.length}ページに配置`);
}

/* Skyline Bottom-Left position finder
   placed: 既存配置済み矩形[], startY: この矩形以上のY位置に配置
   returns {x, y} or null */
function findPosition(item, placed, startY = 0) {
  const W = artboardW, H = artboardH;
  // Build skyline: array of {x, y, w} segments
  // Try every possible position on a grid of candidate Ys
  const candidateYs = new Set([startY]);
  const candidateXs = new Set([0]);
  for (const p of placed) {
    if (p.y + p.h > startY) candidateYs.add(p.y + p.h);
    candidateXs.add(p.x + p.w);
    candidateYs.add(p.y);
  }

  // BL: scan candidate positions bottom-left first
  const ys = [...candidateYs].filter(y => y >= startY).sort((a, b) => a - b);
  const xs = [...candidateXs].sort((a, b) => a - b);

  for (const y of ys) {
    for (const x of xs) {
      if (x + item.w > W || y + item.h > H) continue;
      const cand = { x, y, w: item.w, h: item.h };
      if (!placed.some(p => rectsOverlap(cand, p))) {
        return { x, y };
      }
    }
    // Also try x=0
    const cand0 = { x: 0, y, w: item.w, h: item.h };
    if (item.w <= W && y + item.h <= H && !placed.some(p => rectsOverlap(cand0, p))) {
      return { x: 0, y };
    }
  }

  // Final sweep: try every (x=0..W, y=startY..H) at 1mm granularity if above failed
  for (let y = startY; y <= H - item.h; y += 1) {
    for (let x = 0; x <= W - item.w; x += 1) {
      const cand = { x, y, w: item.w, h: item.h };
      if (!placed.some(p => rectsOverlap(cand, p))) return { x, y };
    }
  }
  return null;
}

/* ═══════════════════════════════════════════════════════
   CLEAR
═══════════════════════════════════════════════════════ */
document.getElementById('clear-btn').onclick = () => {
  allPlaced().forEach(p => removePlacedEl(p.id));
  boards = []; rects = []; csvGroups = [];
  groupPaletteIdx = 0; nextBoardId = 1; nextPlacedId = 1;
  selectedId = null; selectedBoardId = null;
  hideRotateBtn();
  renderAllBoards();
  renderSidebar();
  updateStats();
  showToast('クリアしました');
};

/* ═══════════════════════════════════════════════════════
   EXPORT  (all boards as separate SVG artboards)
═══════════════════════════════════════════════════════ */
document.getElementById('export-btn').onclick = () => {
  document.getElementById('export-modal').classList.add('open');
};
document.getElementById('cancel-export').onclick = () => {
  document.getElementById('export-modal').classList.remove('open');
};
document.getElementById('do-export').onclick = () => {
  const name = document.getElementById('export-name').value || 'artboard';
  const fmt  = document.getElementById('export-fmt').value;
  const unit = document.getElementById('export-unit').value;
  exportFile(name, fmt, unit);
  document.getElementById('export-modal').classList.remove('open');
};

function convertUnit(mm, unit) {
  if (unit === 'mm') return +mm.toFixed(4);
  if (unit === 'pt') return +(mm * 2.8346).toFixed(4);
  if (unit === 'px') return +(mm / 0.2646).toFixed(4);
  return mm;
}

function exportFile(name, fmt, unit) {
  const aw = convertUnit(artboardW, unit);
  const ah = convertUnit(artboardH, unit);
  const u = unit;

  // Each board becomes one SVG file
  boards.forEach((board, idx) => {
    const groupedSvg = csvGroups.map(grp => {
      const gp = board.placed.filter(p => p.groupId === grp.id);
      if (!gp.length) return '';
      const rects = gp.map(p => {
        const x = convertUnit(p.x, unit), y = convertUnit(p.y, unit);
        const w = convertUnit(p.w, unit), h = convertUnit(p.h, unit);
        const label = p.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const fs = convertUnit(3.5, unit);
        return `    <rect x="${x}${u}" y="${y}${u}" width="${w}${u}" height="${h}${u}" fill="${p.fill}" stroke="${p.border}" stroke-width="0.3${u}"/>
    <text x="${(x+w/2).toFixed(3)}${u}" y="${(y+h/2).toFixed(3)}${u}" font-family="monospace" font-size="${fs}${u}" fill="${p.border}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
      }).join('\n');
      return `  <g id="${grp.fileName}">\n${rects}\n  </g>`;
    }).join('\n');

    const suffix = boards.length > 1 ? `_p${idx + 1}` : '';
    let svg = fmt === 'ai'
      ? `<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg"
  xmlns:i="http://ns.adobe.com/AdobeIllustrator/10.0/"
  x="0${u}" y="0${u}" width="${aw}${u}" height="${ah}${u}" viewBox="0 0 ${aw} ${ah}" xml:space="preserve">
<rect width="${aw}${u}" height="${ah}${u}" fill="white"/>
${groupedSvg}
</svg>`
      : `<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${aw}${u}" height="${ah}${u}" viewBox="0 0 ${aw} ${ah}">
<rect width="${aw}${u}" height="${ah}${u}" fill="white"/>
${groupedSvg}
</svg>`;

    const ext = fmt === 'ai' ? 'ai' : 'svg';
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${name}${suffix}.${ext}`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  showToast(`${boards.length}ファイルをダウンロードしました`);
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if ((e.key === 'r' || e.key === 'R') && selectedId) {
    rotateRect(selectedId, selectedBoardId);
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') &&
       selectedId && document.activeElement.tagName !== 'INPUT') {
    for (const board of boards) {
      const idx = board.placed.findIndex(p => p.id === selectedId);
      if (idx !== -1) { removePlacedEl(board.placed[idx].id); board.placed.splice(idx, 1); break; }
    }
    selectedId = null; selectedBoardId = null;
    hideRotateBtn(); renderSidebar(); updateStats();
  }
  if (e.key === 'Escape') selectRect(null, null);
});
