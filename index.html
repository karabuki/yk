<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RectPlacer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1917;
  --surface:#292524;
  --surface2:#3a3836;
  --border:#57534e;
  --accent:#d97757;
  --accent-hover:#c4633f;
  --text:#e7e5e4;
  --muted:#a8a29e;
  --danger:#ef4444;

  /* サイドバー・ツールバー用ライトカラー（claude.aiのUI色） */
  --ui-bg:#f5f0eb;
  --ui-surface:#faf7f4;
  --ui-surface2:#ede8e3;
  --ui-border:#ddd8d2;
  --ui-text:#1c1917;
  --ui-muted:#78716c;
}
html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:210px;min-width:210px;background:var(--ui-bg);border-right:1px solid var(--ui-border);display:flex;flex-direction:column;overflow:hidden;border-radius:0}
#sidebar-header{padding:10px 12px 9px;border-bottom:1px solid var(--ui-border);display:flex;align-items:baseline;gap:6px}
#sidebar-header h1{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700;font-size:13px;color:var(--text);letter-spacing:-.2px}
#sidebar-header p{font-size:9px;color:var(--muted)}
#group-order-hint{font-size:8px;color:var(--ui-muted);padding:4px 10px;letter-spacing:.3px;border-bottom:1px solid var(--ui-border);background:var(--ui-surface2)}
#rect-list-wrap{flex:1;overflow-y:auto;padding:4px 5px;background:var(--ui-bg)}
#rect-list-wrap::-webkit-scrollbar{width:3px}
#rect-list-wrap::-webkit-scrollbar-thumb{background:var(--ui-border);border-radius:2px}
.group-header{display:flex;align-items:center;gap:5px;padding:6px 4px 4px;margin-top:8px;border-bottom:1.5px solid;cursor:grab;user-select:none;border-radius:4px 4px 0 0;color:var(--ui-text)}
.group-header:first-child{margin-top:2px}
.group-header.drag-over{background:#ffffff18}
.group-drag-handle{font-size:10px;color:var(--muted);opacity:.5}
.group-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;border:1.5px solid}
.group-name{font-size:9px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.group-count{font-size:8px;color:var(--ui-muted);flex-shrink:0}
.rect-item{display:flex;align-items:center;gap:6px;padding:5px 8px;margin-bottom:2px;background:transparent;border:1px solid transparent;border-radius:6px;cursor:grab;user-select:none;transition:background .12s;color:var(--ui-text)}
.rect-item:hover{background:var(--ui-surface2);border-color:var(--ui-border)}
.rect-item.placed{opacity:.55;cursor:default}
.rect-color-swatch{width:8px;height:8px;border-radius:2px;flex-shrink:0;border:1px solid}
.rect-item-info{flex:1;min-width:0;display:flex;align-items:baseline;gap:4px;overflow:hidden}
.rect-item-name{font-size:9px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1}
.rect-item-dims{font-size:8px;color:var(--ui-muted)}
.placed-badge{font-size:9px;padding:2px 6px;color:#fff;border-radius:10px;cursor:pointer;flex-shrink:0;font-weight:500}
.placed-badge:hover{opacity:.65}
#sidebar-bottom{border-top:1px solid var(--ui-border);padding:6px;display:flex;flex-direction:column;gap:5px}
#csv-label{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border-radius:7px;font-size:11px;border:1px dashed var(--ui-border);cursor:pointer;color:var(--ui-muted);transition:all .12s}
#csv-label:hover{border-color:var(--accent);color:var(--accent);background:var(--ui-surface2)}
#csv-input{display:none}
.btn-row{display:flex;gap:5px}
.btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 10px;border-radius:6px;font-family:inherit;font-size:11px;border:1px solid var(--border);cursor:pointer;background:var(--surface2);color:var(--text);white-space:nowrap;transition:background .12s,border-color .12s}
.btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.btn.accent:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.btn.purple{background:#3d2e1e;border-color:#c4834a;color:#e8a87c;font-weight:600}
.btn.purple:hover{background:#4a3820;border-color:var(--accent)}
#canvas-area{flex:1;display:flex;flex-direction:column;background:#cccccc;overflow:hidden;min-width:0}
#toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 12px;border-bottom:1px solid var(--ui-border);background:var(--ui-bg);flex-shrink:0;color:var(--ui-text)}
.tbar-label{font-size:8px;color:var(--ui-muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.tbar-unit{font-size:8px;color:var(--ui-muted)}
#toolbar input[type=number]{width:62px;padding:4px 7px;background:var(--ui-surface);border:1px solid var(--ui-border);border-radius:6px;color:var(--ui-text);font-family:inherit;font-size:11px}
#toolbar input[type=number]:focus{outline:none;border-color:var(--accent)}
.sep{width:1px;height:14px;background:var(--ui-border);margin:0 2px}
#toolbar .btn{background:var(--ui-surface);border-color:var(--ui-border);color:var(--ui-text)}
#toolbar .btn:hover{background:var(--ui-surface2);border-color:var(--accent);color:var(--accent)}
#toolbar .btn.purple{background:#fdf0e8;border-color:#e8a87c;color:#9a4a1e}
#toolbar .btn.purple:hover{background:#fde8d8;border-color:var(--accent)}
#viewport{flex:1;overflow:auto;position:relative;display:flex;align-items:flex-start;justify-content:center;padding:20px 0;background:#cccccc}
#viewport::-webkit-scrollbar{width:5px;height:5px}
#viewport::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#boards-wrap{display:flex;flex-direction:column;align-items:center;gap:32px;padding:12px 32px 32px}
.board-container{display:flex;flex-direction:column;align-items:center;gap:6px}
.board-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.artboard{position:relative;background:#fff;outline:1px solid #999;box-shadow:0 0 0 1px #ccc,0 6px 32px rgba(0,0,0,.55)}
.placed-rect{position:absolute;border:2px solid transparent;border-radius:1px;cursor:grab;display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none}
.placed-rect:hover{z-index:50!important;box-shadow:0 0 0 2px var(--accent)}
.placed-rect.selected{box-shadow:0 0 0 2.5px var(--accent)!important;z-index:100!important}
.placed-rect.multi-sel{box-shadow:0 0 0 2px #c8b8ff!important;z-index:99!important}
.placed-rect.dragging{opacity:.85;cursor:grabbing;z-index:200!important}
.placed-rect.collision{box-shadow:0 0 0 2px var(--danger)!important}
.rect-label{font-size:7px;font-family:'DM Mono',monospace;color:rgba(0,0,0,.6);pointer-events:none;text-align:center;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
#rubber-band{position:fixed;border:1px solid var(--accent);background:rgba(200,255,87,.08);pointer-events:none;display:none;z-index:9000}
#ghost-rect{position:fixed;pointer-events:none;background:rgba(200,255,87,.2);border:1.5px solid var(--accent);border-radius:1px;display:none;z-index:9999}
#rotate-btn{position:fixed;z-index:500;display:none;background:var(--accent);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:13px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.4);align-items:center;justify-content:center;transition:transform .12s}
#rotate-btn:hover{transform:scale(1.1) rotate(20deg)}
#rotate-btn.visible{display:flex}
#area-badge{position:fixed;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;z-index:300;pointer-events:none;min-width:160px;box-shadow:0 2px 12px rgba(0,0,0,.3);opacity:.85}
.ab-label{font-size:7px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
#multi-info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 6px;font-size:10px;color:var(--muted);z-index:400;display:none;box-shadow:0 2px 12px rgba(0,0,0,.3)}
#multi-info .mi-label{font-size:9px;color:var(--muted);white-space:nowrap;padding:0 4px}
#multi-info .mi-btn{display:flex;align-items:center;justify-content:center;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:10px;font-family:inherit;white-space:nowrap;transition:background .1s}
#multi-info .mi-btn:hover{background:var(--surface);border-color:var(--accent);color:var(--accent)}
#multi-info .mi-sep{width:1px;height:14px;background:var(--border)}
#export-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#export-modal.open{display:flex}
#export-dialog{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:340px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
#export-dialog h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.form-group select,.form-group input[type=text]{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:12px}
.form-group select:focus,.form-group input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:8px 16px;border-radius:20px;font-size:11px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:2000;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,.3)}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header"><h1 style="font-size:14px;font-weight:700;color:#333333;letter-spacing:-.3px">RectPlacer</h1><p style="font-size:9px;color:var(--muted)">配置ツール</p></div>
    <div id="group-order-hint">⋮⋮ ドラッグで優先順変更</div>
    <div id="rect-list-wrap"><div id="rect-list"></div></div>
    <div id="sidebar-bottom">
      <label id="csv-label" for="csv-input">📂 CSV読み込み（複数可）</label>
      <input type="file" id="csv-input" accept=".csv,text/csv" multiple>
      <div class="btn-row">
        <button class="btn danger" id="clear-btn" style="flex:1" title="すべてクリア（CSV含む）">🗑</button>
        <button class="btn danger" id="unplace-all-btn" style="flex:1" title="配置をすべて未配置に戻す">↩</button>
        <button class="btn purple" id="auto-place-btn" style="flex:3">⚡ 自動配置</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="ai-place-btn" style="flex:1;background:#1a1230;border-color:#7c3aed;color:#c4b5fd;font-size:10px;padding:5px">🤖 AI配置</button>
        <button class="btn accent" id="export-btn" style="flex:1;padding:5px">↑ 書き出し</button>
      </div>
      <button class="btn" id="ai-feedback-btn" style="width:100%;background:#0f1a20;border-color:#0891b2;color:#7dd3fc;font-size:9px;padding:4px;display:none">📝 フィードバックを記録</button>
    </div>
  </div>
  <div id="canvas-area">
    <div id="toolbar">
      <span class="tbar-label">アートボードサイズ</span>
      <input type="number" id="ab-w" value="1088" min="1" max="10000" step="0.1">
      <span class="tbar-unit">x</span>
      <input type="number" id="ab-h" value="738" min="1" max="10000" step="0.1">
      <span class="tbar-unit">mm</span>
      <button class="btn" id="apply-ab-btn" style="padding:3px 8px">適用</button>
      <div class="sep"></div>
      <span class="tbar-label">スナップ</span>
      <input type="number" id="snap-dist" value="20" min="0" max="50" step="0.5" style="width:44px">
      <span class="tbar-unit">mm</span>
      <div class="sep"></div>
      <button class="btn" id="rotate-selected-btn" style="padding:3px 8px">&#8635; 回転</button>
    </div>
    <div id="viewport"><div id="boards-wrap"></div></div>
  </div>

  <!-- ショートカット一覧（右上固定） -->
  <div id="shortcut-panel" style="position:fixed;top:38px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;z-index:200;font-size:9px;color:var(--muted);line-height:1.9;pointer-events:none;opacity:.88;min-width:160px">
    <div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;opacity:.6">ショートカット</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">R</kbd> 選択矩形を回転</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">U</kbd> 選択矩形を引っ込め</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">H</kbd> 左右リフレクト</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">V</kbd> 上下リフレクト</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">Del</kbd> 選択矩形を削除</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">Esc</kbd> 選択解除</div>
    <div><kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:8px;font-family:monospace">Shift</kbd>+クリック 複数選択</div>
    <div>ドラッグ 範囲選択</div>
  </div>
</div>
<button id="rotate-btn">&#8635;</button>
<div id="area-badge"><div class="ab-label">配置面積</div><div id="badge-groups"></div></div>
<div id="multi-info"></div>
<div id="rubber-band"></div>
<div id="ghost-rect"></div>
<div id="export-modal">
  <div id="export-dialog">
    <h2>エクスポート設定</h2>
    <div class="form-group"><label>ファイル名</label><input type="text" id="export-name" value="artboard"></div>
    <div class="form-group"><label>フォーマット</label>
      <select id="export-fmt"><option value="svg">SVG</option><option value="ai">AI (SVG)</option><option value="jpg">JPG</option><option value="pdf">PDF</option></select></div>
    <div class="form-group"><label>単位</label>
      <select id="export-unit"><option value="mm" selected>mm</option><option value="pt">pt</option><option value="px">px</option></select></div>
    <div class="modal-actions">
      <button class="btn" id="cancel-export" style="flex:1">キャンセル</button>
      <button class="btn accent" id="do-export" style="flex:1">ダウンロード</button>
    </div>
  </div>
</div>
<!-- AI配置モーダル -->
<div id="ai-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:var(--surface);border:1px solid #7c3aed;border-radius:12px;padding:22px;min-width:400px;max-width:500px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:18px">🤖</span>
      <h2 style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700">AI配置 (Claude)</h2>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.6">
      配置の要望を自由に入力してください。空欄でも最適配置を試みます。
    </div>
    <textarea id="ai-prompt" placeholder="例: CSV1を左上にまとめて、CSV2は右下に。なるべく正方形に近い形で。" style="width:100%;height:70px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;resize:none;line-height:1.5"></textarea>
    <!-- フィードバック表示エリア -->
    <div id="ai-feedback-wrap" style="display:none;margin-top:8px">
      <div style="font-size:9px;color:#c4b5fd;margin-bottom:4px;letter-spacing:.5px">📝 前回の手動修正からのフィードバック</div>
      <div id="ai-feedback-text" style="font-size:10px;color:var(--muted);background:var(--bg);border:1px solid #7c3aed44;border-radius:5px;padding:6px 8px;line-height:1.5;max-height:80px;overflow-y:auto"></div>
      <label style="display:flex;align-items:center;gap:6px;margin-top:5px;font-size:10px;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="ai-use-feedback" checked style="accent-color:#7c3aed">
        このフィードバックを次のAI配置に使用する
      </label>
    </div>
    <div id="ai-status" style="font-size:10px;color:#c4b5fd;margin-top:8px;min-height:16px"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn" id="ai-cancel" style="flex:1">キャンセル</button>
      <button class="btn" id="ai-run" style="flex:2;background:#7c3aed;border-color:#7c3aed;color:#fff;font-weight:600">🤖 AI配置を実行</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
function roundMm(v,d=2){return Math.round(v*10**d)/10**d}
let csvGroups=[],rects=[],boards=[];
let nextBoardId=1,nextPlacedId=1,nextGroupId=1;
let selIds=new Set(),selBid=null;
let artboardW=1088,artboardH=738,snapDist=20;
// 矩形間マージン（mm）。矩形同士の衝突・配置判定に使用。
// アートボード端には適用しない。
const RECT_MARGIN = 5;

const PAL=[
  {fill:'#ffc2c2',border:'#c03030'},{fill:'#b8d4ff',border:'#2a60c0'},
  {fill:'#b8f5c0',border:'#208a38'},{fill:'#fff0a0',border:'#b08000'},
  {fill:'#e0c0ff',border:'#8030c0'},{fill:'#ffd0a0',border:'#c05010'},
  {fill:'#a8f0f8',border:'#0880a0'},{fill:'#ffb8e0',border:'#c0208a'},
  {fill:'#c8f0a0',border:'#407820'},{fill:'#c0c8ff',border:'#2030a8'},
];
let palIdx=0;
function nextPal(){return PAL[palIdx++%PAL.length]}
const bw=document.getElementById('boards-wrap');
const rl=document.getElementById('rect-list');
const rotBtn=document.getElementById('rotate-btn');
const ghost=document.getElementById('ghost-rect');
const vp=document.getElementById('viewport');
const rb=document.getElementById('rubber-band');
const mi=document.getElementById('multi-info');
let scale=1;
function cs(){const p=80;return Math.min((vp.clientWidth-p)/artboardW,(vp.clientHeight-p)/artboardH,2)*0.9}
function mp(mm){return mm*scale}
function pm(px){return px/scale}
function gp(bid){const b=boards.find(b=>b.id===bid);return b?b.placed:[]}
function ap(){return boards.flatMap(b=>b.placed)}
function eb(id){if(!boards.find(b=>b.id===id))boards.push({id,placed:[]});return boards.find(b=>b.id===id)}
function gbe(id){return document.getElementById('ab-'+id)}

function renderBoards(){
  scale=cs();bw.innerHTML='';
  const wPx=mp(artboardW),hPx=mp(artboardH);
  // 常に最低2枚確保
  if(boards.length===0){eb(1);eb(2);nextBoardId=3}
  else if(boards.length===1){const nid=nextBoardId++;eb(nid)}
  boards.forEach((board,idx)=>{
    const c=document.createElement('div');c.className='board-container';
    c.innerHTML='<div class="board-label">アートボード '+(idx+1)+(boards.length>1?' <span style="font-size:7px;opacity:.5">← →ドラッグで移動可</span>':'')+'</div><div style="position:relative;flex-shrink:0"><div class="artboard" id="ab-'+board.id+'" style="width:'+wPx+'px;height:'+hPx+'px"></div></div>';
    bw.appendChild(c);
    const ae=c.querySelector('.artboard');
    ae.addEventListener('mousedown',e=>abMD(e,board.id));
    board.placed.forEach(p=>rr(p,board.id));
  });
}
new ResizeObserver(()=>renderBoards()).observe(vp);
document.getElementById('apply-ab-btn').onclick=()=>{artboardW=parseFloat(document.getElementById('ab-w').value)||1088;artboardH=parseFloat(document.getElementById('ab-h').value)||738;renderBoards()};
document.getElementById('snap-dist').onchange=e=>snapDist=parseFloat(e.target.value)||5;

function parseCSV(txt){
  txt=txt.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  return txt.split('\n').filter(l=>l.trim()).map(line=>{
    const cols=[];let cur='',q=false;
    for(const c of line){if(c==='"'){q=!q;continue}if(c===','&&!q){cols.push(cur);cur='';continue}cur+=c}
    cols.push(cur);return cols.map(s=>s.trim());
  });
}
function loadCsv(txt,fname){
  const rows=parseCSV(txt);if(!rows.length)return 0;
  const pal=nextPal();
  const grp={id:nextGroupId++,fileName:fname,fill:pal.fill,border:pal.border,priority:csvGroups.length};
  csvGroups.push(grp);let n=0;
  for(let i=0;i<rows.length;i++){
    const c=rows[i];if(c.length<7)continue;
    if(isNaN(parseFloat(c[5])))continue;
    if((c[4]||'').includes('なし'))continue;
    const w=parseFloat(c[5]),h=parseFloat(c[6]);
    if(!w||!h||w<=0||h<=0)continue;
    let base=c[1]||'';try{base=decodeURIComponent(base)}catch(e){}
    base=base.replace(/\.ai$/i,'');
    rects.push({id:Date.now()+Math.random(),groupId:grp.id,name:base+'#'+(c[3]||n+1),w:roundMm(w),h:roundMm(h),fill:grp.fill,border:grp.border});
    n++;
  }
  return n;
}
document.getElementById('csv-input').onchange=function(e){
  const files=[...e.target.files];if(!files.length)return;
  let total=0;
  const load=i=>{
    if(i>=files.length){if(boards.length===0){eb(1);eb(2);nextBoardId=3}renderBoards();renderSidebar();updateStats();toast(files.length+'ファイル・'+total+'個を読み込み');return}
    const r=new FileReader();
    r.onload=ev=>{total+=loadCsv(ev.target.result,files[i].name);load(i+1)};
    r.readAsText(files[i],'UTF-8');
  };
  load(0);this.value='';
};

let dgid=null;
function renderSidebar(){
  rl.innerHTML='';
  if(!rects.length){rl.innerHTML='<div style="font-size:9px;color:var(--muted);padding:6px">CSVを読み込んでください</div>';return}
  const sorted=[...csvGroups].sort((a,b)=>a.priority-b.priority);
  const allp=ap();
  sorted.forEach(grp=>{
    const gr=rects.filter(r=>r.groupId===grp.id);if(!gr.length)return;
    const code=grp.fileName.match(/\d{8}/);
    const lbl=code?code[0]:grp.fileName.replace(/\.csv$/i,'');
    const pc=allp.filter(p=>p.groupId===grp.id).length;
    const hdr=document.createElement('div');
    hdr.className='group-header';hdr.style.borderColor=grp.border;
    hdr.draggable=true;hdr.dataset.gid=grp.id;
    hdr.innerHTML='<span class="group-drag-handle">&#8942;&#8942;</span><div class="group-dot" style="background:'+grp.fill+';border-color:'+grp.border+'"></div><span class="group-name" style="color:'+grp.border+'">'+lbl+'</span><span class="group-count">'+pc+'/'+gr.length+'</span><button class="grp-auto-btn" data-gid="'+grp.id+'" title="このCSVのみ自動配置" style="margin-left:auto;flex-shrink:0;background:none;border:1px solid '+grp.border+'55;border-radius:3px;color:'+grp.border+';font-size:8px;padding:1px 5px;cursor:pointer;line-height:1.4">&#9889;</button>';
    // ⚡ボタンのクリック（ヘッダーのdragstartが発火しないよう stopPropagation）
    hdr.querySelector('.grp-auto-btn').addEventListener('click',e=>{e.stopPropagation();autoPlaceGroup(parseInt(e.currentTarget.dataset.gid))});
    hdr.addEventListener('dragstart',e=>{dgid=parseInt(e.currentTarget.dataset.gid);e.dataTransfer.effectAllowed='move'});
    hdr.addEventListener('dragover',e=>{e.preventDefault();e.currentTarget.classList.add('drag-over')});
    hdr.addEventListener('dragleave',e=>e.currentTarget.classList.remove('drag-over'));
    hdr.addEventListener('drop',e=>{
      e.preventDefault();e.currentTarget.classList.remove('drag-over');
      const tid=parseInt(e.currentTarget.dataset.gid);if(tid===dgid)return;
      const s=[...csvGroups].sort((a,b)=>a.priority-b.priority);
      const fi=s.findIndex(g=>g.id===dgid),ti=s.findIndex(g=>g.id===tid);
      if(fi<0||ti<0)return;
      s.splice(ti,0,s.splice(fi,1)[0]);s.forEach((g,i)=>g.priority=i);
      renderSidebar();toast('優先順を変更しました');
    });
    hdr.addEventListener('dragend',()=>{dgid=null;document.querySelectorAll('.group-header').forEach(h=>h.classList.remove('drag-over'))});
    rl.appendChild(hdr);
    gr.forEach(r=>{
      const p=allp.find(p=>p.rectId===r.id);const ip=!!p;
      const div=document.createElement('div');
      div.className='rect-item'+(ip?' placed':'');
      div.style.borderColor=ip?grp.border+'44':grp.border+'99';
      div.innerHTML='<div class="rect-color-swatch" style="background:'+grp.fill+';border-color:'+grp.border+'"></div><div class="rect-item-info" style="display:flex;align-items:baseline;gap:4px;min-width:0"><div class="rect-item-name">#'+(r.name.split('#')[1]||r.name)+'</div><div class="rect-item-dims" style="font-size:7px;white-space:nowrap">'+Math.ceil(r.w)+'×'+Math.ceil(r.h)+'mm</div></div>'+(ip?'<span class="placed-badge" data-pid="'+p.id+'" style="background:'+grp.border+'" title="クリックで引っ込める">&#10003;</span>':'');
      if(!ip)div.addEventListener('mousedown',e=>listDragStart(e,r));
      const badge=div.querySelector('.placed-badge');
      if(badge)badge.addEventListener('click',e=>{e.stopPropagation();recall(parseInt(badge.dataset.pid))});
      rl.appendChild(div);
    });
  });
}

function recall(pid){
  for(const b of boards){const i=b.placed.findIndex(p=>p.id===pid);if(i!==-1){rmEl(b.placed[i].id);b.placed.splice(i,1);break}}
  selIds.delete(pid);if(!selIds.size){selBid=null;hidRot()}
  renderSidebar();updateStats();updMI();
}
function recallAll(){[...selIds].forEach(recall);clrSel()}

function bboxGrp(gid){
  const ps=ap().filter(p=>p.groupId===gid);if(!ps.length)return null;
  const mnX=Math.min(...ps.map(p=>p.x)),mnY=Math.min(...ps.map(p=>p.y));
  const mxX=Math.max(...ps.map(p=>p.x+p.w)),mxY=Math.max(...ps.map(p=>p.y+p.h));
  return{w:roundMm(mxX-mnX),h:roundMm(mxY-mnY),area:roundMm((mxX-mnX)*(mxY-mnY))};
}
function updateStats(){
  const bg=document.getElementById('badge-groups');if(!bg)return;
  const allp=ap();
  if(!csvGroups.length||!allp.length){bg.innerHTML='<div style="font-size:9px;color:var(--muted)">矩形未配置</div>';return}
  const sorted=[...csvGroups].sort((a,b)=>a.priority-b.priority);
  let html='';
  sorted.forEach(grp=>{
    const bbox=bboxGrp(grp.id);
    const gpc=allp.filter(p=>p.groupId===grp.id).length;
    const gtc=rects.filter(r=>r.groupId===grp.id).length;if(!gtc)return;
    const as=bbox?Math.ceil(bbox.area).toLocaleString('ja-JP'):'—';
    const ws=bbox?Math.ceil(bbox.w):'—',hs=bbox?Math.ceil(bbox.h):'—';
    const code=grp.fileName.match(/\d{8}/);
    const lbl=code?code[0]:grp.fileName.replace(/\.csv$/i,'');
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:7px;height:7px;border-radius:1px;background:'+grp.fill+';border:1.5px solid '+grp.border+';flex-shrink:0"></div><span style="font-size:9px;color:var(--muted);flex:1">'+lbl+' '+gpc+'/'+gtc+'</span><span style="font-family:Syne,sans-serif;font-size:12px;font-weight:700;color:'+grp.border+'">'+as+'</span></div><div style="font-size:8px;color:var(--muted);margin-bottom:5px;padding-left:13px">'+ws+'×'+hs+' mm²</div>';
  });
  // 残り面積
  const boardArea=artboardW*artboardH*boards.filter(b=>b.placed.length).length||artboardW*artboardH;
  const usedArea=allp.reduce((s,p)=>s+p.w*p.h,0);
  const remaining=boardArea-usedArea;
  const pct=Math.max(0,Math.round(remaining/boardArea*100));
  html+='<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline">'
    +'<span style="font-size:8px;color:var(--muted)">残り面積</span>'
    +'<span style="font-size:11px;font-family:Syne,sans-serif;font-weight:700;color:var(--muted)">'+pct+'%</span>'
    +'</div>'
    +'<div style="font-size:8px;color:var(--muted);text-align:right">'
    +Math.ceil(remaining).toLocaleString('ja-JP')+' mm²</div>';
  bg.innerHTML=html;
}

// マージンなし重なり判定（BBox計算・禁止ゾーン等で使用）
function ovlp(a,b){return!(a.x+a.w<=b.x||b.x+b.w<=a.x||a.y+a.h<=b.y||b.y+b.h<=a.y)}
// マージン付き重なり判定（矩形同士の配置・衝突チェックで使用）
function ovlpM(a,b){
  const m=RECT_MARGIN;
  return!(a.x+a.w+m<=b.x||b.x+b.w+m<=a.x||a.y+a.h+m<=b.y||b.y+b.h+m<=a.y);
}
function hasC(cand,bid,excl=[]){return gp(bid).some(p=>!excl.includes(p.id)&&ovlpM(cand,p))}
function inB(r){return r.x>=0&&r.y>=0&&r.x+r.w<=artboardW&&r.y+r.h<=artboardH}
function snapC(cand,bid,excl=[]){
  let best=null,bd=Infinity;
  const m=RECT_MARGIN;
  // スナップ候補点: 各矩形の四隅からMARGIN離れた位置
  // (矩形Aの右端+MARGIN がスナップ先 = 矩形BのTL になる、など)
  const offsets=[
    // 候補矩形の右/下 + MARGIN に cand のTL/BL/TR/BRを合わせる
    {dx: m,      dy: 0     }, // 右隣
    {dx: m,      dy:-cand.h}, // 右隣（下揃え）
    {dx:-cand.w-m,dy:0     }, // 左隣
    {dx:-cand.w-m,dy:-cand.h},// 左隣（下揃え）
    {dx: 0,      dy: m     }, // 下隣
    {dx:-cand.w, dy: m     }, // 下隣（右揃え）
    {dx: 0,      dy:-cand.h-m},// 上隣
    {dx:-cand.w, dy:-cand.h-m},// 上隣（右揃え）
  ];
  for(const p of gp(bid)){if(excl.includes(p.id))continue;
    const corners=[{x:p.x,y:p.y},{x:p.x+p.w,y:p.y},{x:p.x,y:p.y+p.h},{x:p.x+p.w,y:p.y+p.h}];
    for(const pc of corners)
      for(const c of offsets){
        const nx=pc.x+c.dx,ny=pc.y+c.dy,d=Math.hypot(cand.x-nx,cand.y-ny);
        if(d<snapDist&&d<bd){const sn={...cand,x:nx,y:ny};if(!hasC(sn,bid,excl)&&inB(sn)){best={x:nx,y:ny};bd=d}}
      }
  }
  return best;
}

function rr(p,bid){
  const ae=gbe(bid);if(!ae)return;
  let el=document.getElementById('pr-'+p.id);
  if(!el){
    el=document.createElement('div');el.id='pr-'+p.id;el.className='placed-rect';
    el.innerHTML='<span class="rect-label">#'+(p.name.split('#')[1]||p.name)+'</span>';
    ae.appendChild(el);
    el.addEventListener('mousedown',e=>rectMD(e,p.id,bid));
  }
  el.style.left=mp(p.x)+'px';el.style.top=mp(p.y)+'px';
  el.style.width=mp(p.w)+'px';el.style.height=mp(p.h)+'px';
  el.style.background=p.fill;el.style.borderColor=p.border;
}
function rmEl(id){const e=document.getElementById('pr-'+id);if(e)e.remove()}

// ── 選択状態を唯一のソースオブトゥルースで管理 ──
// selIds / selBid を更新したあとは必ず applySel() を呼ぶ

function applySel(){
  // 全placed-rectのクラスをリセットしてから再付与
  document.querySelectorAll('.placed-rect').forEach(el=>{
    el.classList.remove('selected','multi-sel');
  });
  const arr=[...selIds];
  arr.forEach(id=>{
    const el=document.getElementById('pr-'+id);
    if(!el)return;
    el.classList.add(arr.length===1?'selected':'multi-sel');
  });
  if(arr.length===1){
    const el=document.getElementById('pr-'+arr[0]);
    if(el)showRot(el); else hidRot();
  } else {
    hidRot();
  }
  updMI();
}

function clrSel(){
  selIds.clear();selBid=null;
  applySel();
}
function setSel(ids,bid){
  selIds.clear();
  ids.forEach(id=>selIds.add(id));
  selBid=bid;
  applySel();
}
function togSel(id,bid){
  if(selBid&&selBid!==bid){selIds.clear();selBid=null;}
  if(selIds.has(id)){selIds.delete(id);}
  else{selIds.add(id);selBid=bid;}
  if(selIds.size===0)selBid=null;
  applySel();
}
function updMI(){
  if(selIds.size<2){mi.style.display='none';return}
  mi.style.display='flex';
  mi.innerHTML=
    '<span class="mi-label">'+selIds.size+'個選択中</span>'+

  document.getElementById('mi-fliph').onclick=()=>reflectSel('h');

    clrSel();renderSidebar();updateStats();

function showRot(el){const r=el.getBoundingClientRect();rotBtn.style.left=(r.right-13)+'px';rotBtn.style.top=(r.top-13)+'px';rotBtn.classList.add('visible')}
function hidRot(){rotBtn.classList.remove('visible')}

let rbSt=null;
function abMD(e,bid){
  // placed-rect上のクリックは無視（rectMDが処理する）
  if(e.target.classList.contains('placed-rect')||e.target.classList.contains('rect-label'))return;
  if(!e.shiftKey)clrSel();
  // 開始時のAR保存
  const ar=gbe(bid).getBoundingClientRect();
  rbSt={sx:e.clientX,sy:e.clientY,bid,ar};
  document.addEventListener('mousemove',rbMv);document.addEventListener('mouseup',rbUp);
}
function rbMv(e){
  if(!rbSt)return;
  const x=Math.min(rbSt.sx,e.clientX),y=Math.min(rbSt.sy,e.clientY);
  rb.style.cssText='display:block;left:'+x+'px;top:'+y+'px;width:'+Math.abs(e.clientX-rbSt.sx)+'px;height:'+Math.abs(e.clientY-rbSt.sy)+'px;position:fixed;';
}
function rbUp(e){
  document.removeEventListener('mousemove',rbMv);document.removeEventListener('mouseup',rbUp);
  rb.style.display='none';if(!rbSt)return;
  const{sx,sy,bid,ar}=rbSt;rbSt=null;
  // mouseup時にARを再取得してより正確に
  const ae=gbe(bid);if(!ae)return;
  const ar2=ae.getBoundingClientRect();
  // ラバーバンド範囲をアートボード座標（mm）に変換
  const rx1mm=pm(Math.min(sx,e.clientX)-ar2.left);
  const ry1mm=pm(Math.min(sy,e.clientY)-ar2.top);
  const rx2mm=pm(Math.max(sx,e.clientX)-ar2.left);
  const ry2mm=pm(Math.max(sy,e.clientY)-ar2.top);
  if(rx2mm-rx1mm<1&&ry2mm-ry1mm<1)return; // 1mm未満は無視
  // mm座標でラバーバンドと矩形の中心が重なるものを選択
  const hit=gp(bid).filter(p=>{
    const cx=p.x+p.w/2, cy=p.y+p.h/2;
    return cx>=rx1mm&&cx<=rx2mm&&cy>=ry1mm&&cy<=ry2mm;
  });
  if(hit.length)setSel(hit.map(p=>p.id),bid);
}

/* ─── ドラッグ状態 ───
   drSt = {
     ids,          // ドラッグ中の placed.id[]
     srcBid,       // ドラッグ開始ボードID
     curBid,       // 現在ホバー中のボードID
     items:[{id,p,ox,oy,dx,dy}]  // 各矩形の元位置・マウスオフセット
   }
──────────────────── */
let drSt=null;

function rectMD(e,id,bid){
  e.preventDefault();e.stopPropagation();
  if(e.shiftKey){togSel(id,bid);return}
  if(!selIds.has(id))setSel([id],bid);

  const srcBoard=boards.find(b=>b.id===bid);
  const srcAr=gbe(bid).getBoundingClientRect();

  // ドラッグ対象矩形の情報を収集（マウス→矩形TLのオフセットをmm単位で保持）
  const items=[...selIds].map(sid=>{
    const p=srcBoard.placed.find(p=>p.id===sid);
    if(!p)return null;
    return{
      id:sid, p,
      ox:p.x, oy:p.y,  // 元位置（復元用）
      dx:pm(e.clientX-srcAr.left)-p.x,  // マウスと矩形TLのmm差
      dy:pm(e.clientY-srcAr.top) -p.y,
    };
  }).filter(Boolean);

  drSt={ids:[...selIds],srcBid:bid,curBid:bid,items};
  items.forEach(({id})=>document.getElementById('pr-'+id)?.classList.add('dragging'));
  hidRot();
  document.addEventListener('mousemove',drMv);
  document.addEventListener('mouseup',drUp);
}

function drMv(e){
  if(!drSt)return;
  const{items,srcBid}=drSt;

  // マウスがどのアートボード上にあるか
  let hovBid=null,hovAr=null;
  for(const b of boards){
    const ae=gbe(b.id);if(!ae)continue;
    const ar=ae.getBoundingClientRect();
    if(e.clientX>=ar.left&&e.clientX<=ar.right&&e.clientY>=ar.top&&e.clientY<=ar.bottom){
      hovBid=b.id;hovAr=ar;break;
    }
  }
  if(!hovBid){hovBid=srcBid;hovAr=gbe(srcBid)?.getBoundingClientRect()}
  if(!hovAr)return;

  // ボードが変わったらハイライト更新
  if(hovBid!==drSt.curBid){
    drSt.curBid=hovBid;
    boards.forEach(b=>{
      const ae=gbe(b.id);
      if(ae)ae.style.outline=b.id===hovBid&&hovBid!==srcBid?'2px solid var(--accent)':'1px solid #999';
    });
  }

  items.forEach(({id,p,dx,dy})=>{
    // ホバーボードのAR基準でmm座標計算
    let x=roundMm(pm(e.clientX-hovAr.left)-dx);
    let y=roundMm(pm(e.clientY-hovAr.top) -dy);
    x=Math.max(0,Math.min(artboardW-p.w,x));
    y=Math.max(0,Math.min(artboardH-p.h,y));
    // スナップ（単体・複数どちらも効かせる、ただし複数は代表矩形のみ）
    if(hovBid===srcBid&&(items.length===1||id===items[0].id)){
      const sn=snapC({x,y,w:p.w,h:p.h},hovBid,[...selIds]);
      if(sn&&items.length===1){x=sn.x;y=sn.y}
      else if(sn&&items.length>1){
        // 代表矩形のスナップ量を全矩形に適用
        const sdx=sn.x-x, sdy=sn.y-y;
        drSt._snapDx=sdx; drSt._snapDy=sdy;
        x=sn.x; y=sn.y;
      }
    } else if(items.length>1&&drSt._snapDx!==undefined&&id!==items[0].id){
      x=roundMm(Math.max(0,Math.min(artboardW-p.w,x+drSt._snapDx)));
      y=roundMm(Math.max(0,Math.min(artboardH-p.h,y+drSt._snapDy)));
    }
    // 表示更新（DOM上の位置とp.x/p.yを同期 → 衝突判定にも使われる）
    p.x=x;p.y=y;
    const el=document.getElementById('pr-'+id);
    if(!el)return;
    // DOM親をホバーボードのartboardに付け替え
    const hovAe=gbe(hovBid);
    if(hovAe&&!hovAe.contains(el))hovAe.appendChild(el);
    el.style.left=mp(x)+'px';
    el.style.top =mp(y)+'px';
    // 衝突表示（自分以外のドラッグ対象も除外）
    el.classList.toggle('collision',hasC({x,y,w:p.w,h:p.h},hovBid,[...selIds]));
  });
}

function drUp(){
  document.removeEventListener('mousemove',drMv);
  document.removeEventListener('mouseup',drUp);
  if(!drSt)return;

  const{items,srcBid,curBid}=drSt;
  drSt=null;

  // ハイライトリセット
  boards.forEach(b=>{const ae=gbe(b.id);if(ae)ae.style.outline='1px solid #999'});

  const srcBoard=boards.find(b=>b.id===srcBid);
  const tgtBoard=boards.find(b=>b.id===curBid);

  let moved=true;
  items.forEach(({id,p,ox,oy})=>{
    const el=document.getElementById('pr-'+id);
    if(!el)return;
    el.classList.remove('dragging','collision');

    // 衝突チェック（自分以外のドラッグ対象も除外）
    const excl=items.map(i=>i.id);
    if(hasC({x:p.x,y:p.y,w:p.w,h:p.h},curBid,excl)){
      // 衝突 → 元位置に戻す
      p.x=ox;p.y=oy;
      const origAe=gbe(srcBid);
      if(origAe&&!origAe.contains(el))origAe.appendChild(el);
      el.style.left=mp(ox)+'px';el.style.top=mp(oy)+'px';
      moved=false;
    } else if(curBid!==srcBid){
      // ボード間移動確定
      srcBoard.placed=srcBoard.placed.filter(pp=>pp.id!==id);
      tgtBoard.placed.push(p);
      // イベント再登録
      const newBid=curBid;
      const handler=(ev)=>rectMD(ev,id,newBid);
      el.addEventListener('mousedown',handler);
    }
      });

  if(!moved)toast('⚠ 衝突するため元の位置に戻しました');
  selBid=curBid;
  applySel();
  updateStats();renderSidebar();
  if(ids.length===1){const el=document.getElementById('pr-'+ids[0]);if(el)showRot(el)}
  updateStats();renderSidebar();drSt=null;
}

function rotOne(id,bid){
  // 単体回転（単独選択時 or BBox回転の内部処理）
  const board=boards.find(b=>b.id===bid);if(!board)return;
  const p=board.placed.find(p=>p.id===id);if(!p)return;
  const nw=p.h,nh=p.w,nx=Math.min(p.x,artboardW-nw),ny=Math.min(p.y,artboardH-nh);
  if(nx<0||ny<0){toast('回転後はみ出します');return}
  if(hasC({x:nx,y:ny,w:nw,h:nh},bid,[id])){toast('回転後に重なります');return}
  p.w=nw;p.h=nh;p.x=nx;p.y=ny;rr(p,bid);
}

function rotSel(){
  if(!selBid||!selIds.size)return;
  if(selIds.size===1){
    // 単体: 従来どおり
    rotOne([...selIds][0],selBid);
    updateStats();
    const el=document.getElementById('pr-'+[...selIds][0]);if(el)showRot(el);
    return;
  }
  // 複数: BBox全体を90°右回転
  // BBox中心を軸に、各矩形の位置をBBox内での相対座標から回転させる
  const board=boards.find(b=>b.id===selBid);if(!board)return;
  const ps=board.placed.filter(p=>selIds.has(p.id));if(!ps.length)return;

  const minX=Math.min(...ps.map(p=>p.x));
  const minY=Math.min(...ps.map(p=>p.y));
  const maxX=Math.max(...ps.map(p=>p.x+p.w));
  const maxY=Math.max(...ps.map(p=>p.y+p.h));
  const bboxW=maxX-minX, bboxH=maxY-minY;

  // 90°右回転後の新BBoxサイズ = bboxH×bboxW（縦横が入れ替わる）
  // 各矩形の回転後位置:
  //   新x = minX + (旧y - minY)            ← BBox内でのy位置がxになる
  //   新y = minY + (bboxW - (旧x - minX) - 旧w)  ← BBox内でのx位置が反転してyになる
  //   新w = 旧h, 新h = 旧w
  const newPositions=ps.map(p=>({
    id:p.id,
    nx: roundMm(minX+(p.y-minY)),
    ny: roundMm(minY+(bboxW-(p.x-minX)-p.w)),
    nw: p.h, nh: p.w
  }));

  // 境界チェック
  for(const np of newPositions){
    if(np.nx<0||np.ny<0||np.nx+np.nw>artboardW||np.ny+np.nh>artboardH){
      toast('回転後にアートボードからはみ出します');return;
    }
  }
  // 衝突チェック（選択外のみ）
  for(const np of newPositions){
    if(hasC({x:np.nx,y:np.ny,w:np.nw,h:np.nh},selBid,[...selIds])){
      toast('回転後に他の矩形と重なります');return;
    }
  }
  // 適用
  newPositions.forEach(np=>{
    const p=board.placed.find(p=>p.id===np.id);if(!p)return;
    p.x=np.nx;p.y=np.ny;p.w=np.nw;p.h=np.nh;
    rr(p,selBid);
  });
  updateStats();
  toast('BBox回転しました');
}

/* リフレクト: axis='h'(左右) or 'v'(上下)
   選択矩形群をまとめたBBoxの中心を軸に鏡面反転 */
function reflectSel(axis){
  if(!selBid||!selIds.size)return;
  const board=boards.find(b=>b.id===selBid);if(!board)return;
  const ps=board.placed.filter(p=>selIds.has(p.id));if(!ps.length)return;

  // 選択群のBBox
  const minX=Math.min(...ps.map(p=>p.x));
  const minY=Math.min(...ps.map(p=>p.y));
  const maxX=Math.max(...ps.map(p=>p.x+p.w));
  const maxY=Math.max(...ps.map(p=>p.y+p.h));
  const cx=(minX+maxX)/2, cy=(minY+maxY)/2;

  // 衝突チェック用に新位置を先に計算
  const newPositions=ps.map(p=>{
    if(axis==='h'){
      // 左右: x軸をcxで反転。矩形の右端がcxから同距離になる
      const nx=2*cx - p.x - p.w;
      return{id:p.id,x:roundMm(nx),y:p.y,w:p.w,h:p.h};
    }else{
      const ny=2*cy - p.y - p.h;
      return{id:p.id,x:p.x,y:roundMm(ny),w:p.w,h:p.h};
    }
  });

  // 境界チェック
  for(const np of newPositions){
    if(np.x<0||np.y<0||np.x+np.w>artboardW||np.y+np.h>artboardH){
      toast('リフレクト後にアートボードからはみ出します');return;
    }
  }
  // 他の矩形との衝突チェック（選択外のみ）
  for(const np of newPositions){
    if(hasC({x:np.x,y:np.y,w:np.w,h:np.h},selBid,[...selIds])){
      toast('リフレクト後に他の矩形と重なります');return;
    }
  }

  // 適用
  newPositions.forEach(np=>{
    const p=board.placed.find(p=>p.id===np.id);if(!p)return;
    p.x=np.x;p.y=np.y;
    const el=document.getElementById('pr-'+p.id);
    if(el){el.style.left=mp(p.x)+'px';el.style.top=mp(p.y)+'px';}
  });
  updateStats();
  toast(axis==='h'?'左右リフレクト完了':'上下リフレクト完了');
}

let ldSt=null;
function listDragStart(e,rect){
  // 配置済み矩形の重複防止
  const alreadyPlaced=ap().some(p=>p.rectId===rect.id);
  if(alreadyPlaced){toast('すでに配置済みです（✓で引っ込めてから再配置）');return}
  e.preventDefault();
  ghost.style.cssText='display:block;width:'+mp(rect.w)+'px;height:'+mp(rect.h)+'px;left:'+(e.clientX-mp(rect.w)/2)+'px;top:'+(e.clientY-mp(rect.h)/2)+'px';
  ldSt={rect};
  document.addEventListener('mousemove',ldMv);document.addEventListener('mouseup',ldUp);
}
function ldMv(e){if(!ldSt)return;ghost.style.left=(e.clientX-mp(ldSt.rect.w)/2)+'px';ghost.style.top=(e.clientY-mp(ldSt.rect.h)/2)+'px'}
function ldUp(e){
  document.removeEventListener('mousemove',ldMv);document.removeEventListener('mouseup',ldUp);
  ghost.style.display='none';
  const r=ldSt.rect;ldSt=null;
  if(!boards.length){eb(nextBoardId);renderBoards()}
  for(const board of boards){
    const ae=gbe(board.id);if(!ae)continue;
    const ar=ae.getBoundingClientRect();
    if(e.clientX<ar.left||e.clientX>ar.right||e.clientY<ar.top||e.clientY>ar.bottom)continue;
    let x=roundMm(pm(e.clientX-ar.left-mp(r.w)/2));
    let y=roundMm(pm(e.clientY-ar.top-mp(r.h)/2));
    x=Math.max(0,Math.min(artboardW-r.w,x));y=Math.max(0,Math.min(artboardH-r.h,y));
    const sn=snapC({x,y,w:r.w,h:r.h},board.id);if(sn){x=sn.x;y=sn.y}
    if(hasC({x,y,w:r.w,h:r.h},board.id))toast('重なっています');
    const pid=nextPlacedId++;
    const p={id:pid,rectId:r.id,groupId:r.groupId,x,y,w:r.w,h:r.h,fill:r.fill,border:r.border,name:r.name};
    board.placed.push(p);rr(p,board.id);setSel([pid],board.id);renderSidebar();updateStats();return;
  }
  // ドロップ先がどのアートボードでもない場合: 1枚目→2枚目の順で空き探し
  for(const board of boards){
    const pos=findFreePos(r,board);
    if(pos){
      const pid=nextPlacedId++;
      const p={id:pid,rectId:r.id,groupId:r.groupId,x:pos.x,y:pos.y,w:r.w,h:r.h,fill:r.fill,border:r.border,name:r.name};
      board.placed.push(p);rr(p,board.id);setSel([pid],board.id);renderSidebar();updateStats();
      toast('アートボード '+(boards.indexOf(board)+1)+' に配置しました');return;
    }
  }
  toast('配置できる空きがありません');
}

// 現在の配置スナップショットを取る
function takeSnapshot(){
  return boards.flatMap(b=>b.placed.map(p=>({
    id:p.id, rectId:p.rectId, groupId:p.groupId,
    x:p.x, y:p.y, w:p.w, h:p.h, name:p.name
  })));
}

// AI配置と手動修正を比較してフィードバック文を生成
function generateFeedback(before, after){
  const diffs=[];
  for(const bp of before){
    const ap=after.find(p=>p.rectId===bp.rectId);
    if(!ap)continue;
    const dx=roundMm(ap.x-bp.x), dy=roundMm(ap.y-bp.y);
    const rotated=(ap.w===bp.h&&ap.h===bp.w);
    if(Math.abs(dx)>1||Math.abs(dy)>1||rotated){
      const grp=csvGroups.find(g=>g.id===bp.groupId);
      const code=grp?.fileName.match(/\d{8}/)?.[0]||grp?.fileName||'';
      const num=bp.name.split('#')[1]||bp.name;
      let desc=code+'#'+num+': ';
      if(rotated) desc+='90°回転';
      if(Math.abs(dx)>1||Math.abs(dy)>1){
        if(rotated) desc+=' + ';
        desc+=(dx>0?'右':'左')+Math.abs(dx).toFixed(0)+'mm '+(dy>0?'下':'上')+Math.abs(dy).toFixed(0)+'mm に移動';
      }
      diffs.push(desc);
    }
  }
  if(!diffs.length)return null;
  return{
    before, after,
    summary: diffs.join(' / ')
  };
}

async function runAIPlace(){
  const btn=document.getElementById('ai-run');
  btn.disabled=true;btn.textContent='⏳ AI思考中...';
  aiStatus.textContent='Claudeが配置を考えています...';
  const useFeedback=document.getElementById('ai-use-feedback')?.checked;

  // 矩形情報をまとめる
  const groups=[...csvGroups].sort((a,b)=>a.priority-b.priority);
  const rectInfo=groups.map(g=>{
    const gr=rects.filter(r=>r.groupId===g.id);
    const label=g.fileName.match(/\d{8}/)?.[0]||g.fileName.replace(/\.csv$/i,'');
    return 'グループ'+label+':\n'+gr.map(r=>{
      const num=r.name.split('#')[1]||r.name;
      return '  id='+Math.round(r.id)+' #'+num+' '+Math.ceil(r.w)+'x'+Math.ceil(r.h)+'mm';
    }).join('\n');
  }).join('\\n')

  const userPrompt=aiPrompt.value.trim();
  const systemPrompt=[
    'あなたは矩形配置の専門家です。与えられた矩形リストをアートボードに配置する最適な座標を計算してください。',
    '',
    'ルール:',
    '- アートボードサイズ: '+artboardW+'x'+artboardH+'mm',
    '- 矩形間のマージン: '+RECT_MARGIN+'mm（矩形同士は最低'+RECT_MARGIN+'mm離す）',
    '- 矩形はアートボード内に収める（x>=0, y>=0, x+w<='+artboardW+', y+h<='+artboardH+'）',
    '- 同じグループの矩形は隣接させ、グループ間でBBoxが重ならないようにする',
    '- 必ず全矩形を1つずつ配置する（同じidを2回使わない）',
    '- wとhは入力値をそのまま使う（変更しない）',
    '',
    '回答はJSON形式のみ。説明文・マークダウン不要。以下の形式で:',
    '{"placements":[{"id":矩形のid番号,"x":X座標,"y":Y座標,"w":幅,"h":高さ},...]}',
    '全矩形分のエントリが必要。',
  ].join('\n');

  let feedbackNote='';
  if(useFeedback&&aiFeedbackHistory.length){
    feedbackNote='\n\n【前回の修正フィードバック（これを参考に改善してください）】\n'+
      aiFeedbackHistory.map((fb,i)=>'修正'+(i+1)+': '+fb.summary).join('\n');
  }
  const userMsg='以下の矩形を配置してください.\n\nアートボード: '+artboardW+'x'+artboardH+'mm\nマージン: '+RECT_MARGIN+'mm\n\n矩形リスト:\n'+rectInfo+(userPrompt?'\n\n追加要望: '+userPrompt:'')+feedbackNote;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        system:systemPrompt,
        messages:[{role:'user',content:userMsg}]
      })
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message)}

    const text=data.content.find(c=>c.type==='text')?.text||'';
    // JSON抽出
    const jsonMatch=text.match(/\{[\s\S]*\}/);
    if(!jsonMatch)throw new Error('JSONが見つかりません: '+text.slice(0,100));
    const result=JSON.parse(jsonMatch[0]);
    if(!result.placements?.length)throw new Error('placements が空です');

    // 配置を適用
    applyAIPlacements(result.placements);
    aiModal.style.display='none';
    // AI配置直後のスナップショットを記録（フィードバック用）
    lastAIPlacement=takeSnapshot();

  }catch(err){

    console.error('AI配置エラー',err);
  }finally{
    btn.disabled=false;btn.textContent='🤖 AI配置を実行';

}

function applyAIPlacements(placements){
  ap().forEach(p=>rmEl(p.id));
  boards=[];nextPlacedId=1;nextBoardId=1;clrSel();
  eb(nextBoardId++);
  if(boards.length<2)eb(nextBoardId++);

  const board=boards[0];
  const usedRectIds=new Set(); // 重複配置を防ぐ

  for(const pl of placements){
    // まずidで完全一致を試みる
    let r=null;
    if(pl.id!==undefined){
      // AIが返したidで検索（浮動小数点の場合があるので丸める）
      const targetId=Math.round(parseFloat(pl.id));
      r=rects.find(rc=>Math.round(rc.id)===targetId && !usedRectIds.has(rc.id));
    }
    // idで見つからなければnameでフォールバック
    if(!r && pl.name){
      const plNum=(pl.name+'').split('#').pop();
      r=rects.find(rc=>{
        if(usedRectIds.has(rc.id))return false;
        const rcNum=rc.name.split('#').pop();
        return rcNum===plNum||rc.name===pl.name;
      });
    }
    if(!r){console.warn('対応矩形なし:',pl);continue}

    usedRectIds.add(r.id); // 使用済みマーク

    // 座標バリデーション（アートボード内に収める）
    const w=roundMm(parseFloat(pl.w)||r.w);
    const h=roundMm(parseFloat(pl.h)||r.h);
    const x=roundMm(Math.max(0,Math.min(artboardW-w,parseFloat(pl.x)||0)));
    const y=roundMm(Math.max(0,Math.min(artboardH-h,parseFloat(pl.y)||0)));

    const pid=nextPlacedId++;
    board.placed.push({id:pid,rectId:r.id,groupId:r.groupId,
      x,y,w,h,fill:r.fill,border:r.border,name:r.name});
  }

  // 未配置の矩形をチェックして警告
  const unplaced=rects.filter(r=>!usedRectIds.has(r.id));
  if(unplaced.length){
    toast('⚠ '+unplaced.length+'個が未配置: '+unplaced.map(r=>r.name.split('#')[1]||r.name).join(', '));
    console.warn('未配置:',unplaced);
  }

  renderBoards();renderSidebar();updateStats();
}
/* ══════════════════════════════════════════════════
   AUTO PLACE  —  グループ境界厳守アルゴリズム

   方針:
   ① CSV順（priority順）に1グループずつ処理
   ② 各グループはそれ以前のグループのBBoxを
      「禁止ゾーン」として扱い、その外にのみ配置
   ③ 同グループ内はBL法（左上詰め）で面積降順配置
   ④ 1枚目に入らなければ2枚目へ（禁止ゾーンなし）
   ⑤ 常に最低2枚確保
══════════════════════════════════════════════════ */
/* ─── 単一グループ自動配置 ───
   対象グループの配置済み矩形を一度引っ込め、
   他グループのBBoxを禁止ゾーンとして回避しながら最適配置する */
function autoPlaceGroup(gid){
  const grp=csvGroups.find(g=>g.id===gid);
  if(!grp){toast('グループが見つかりません');return}

  // ボードがなければ2枚作成
  if(boards.length===0){eb(1);eb(2);nextBoardId=3;renderBoards()}

  // 対象グループの配置済み矩形を引っ込める
  for(const board of boards){
    const toRemove=board.placed.filter(p=>p.groupId===gid);
    toRemove.forEach(p=>{rmEl(p.id);board.placed=board.placed.filter(pp=>pp.id!==p.id)});
  }

  // 配置対象アイテム（面積降順）
  const items=rects
    .filter(r=>r.groupId===gid)
    .map(r=>({...r}))
    .sort((a,b)=>Math.max(b.w,b.h)-Math.max(a.w,a.h)||Math.min(b.w,b.h)-Math.min(a.w,a.h));

  // 禁止ゾーン: 他グループのBBox（ボードごと）
  const forbiddenZones={};
  for(const board of boards){
    const otherPlaced=board.placed.filter(p=>p.groupId!==gid);
    if(!otherPlaced.length)continue;
    // グループごとにBBoxを計算
    const otherGids=[...new Set(otherPlaced.map(p=>p.groupId))];
    otherGids.forEach(ogid=>{
      const ps=otherPlaced.filter(p=>p.groupId===ogid);
      const bx1=Math.min(...ps.map(p=>p.x));
      const by1=Math.min(...ps.map(p=>p.y));
      const bx2=Math.max(...ps.map(p=>p.x+p.w));
      const by2=Math.max(...ps.map(p=>p.y+p.h));
      if(!forbiddenZones[board.id])forbiddenZones[board.id]=[];
      forbiddenZones[board.id].push({x:bx1,y:by1,w:bx2-bx1,h:by2-by1});
    });
  }

  let placed=0,failed=[];
  for(const item of items){
    let done=false;
    // 既存ボードに順番に試みる
    for(let bi=0;bi<boards.length&&!done;bi++){
      const board=boards[bi];
      const fz=forbiddenZones[board.id]||[];
      const pos=findPosWithForbidden(item,board.placed,fz);
      if(pos){
        const pid=nextPlacedId++;
        board.placed.push({id:pid,rectId:item.id,groupId:item.groupId,
          x:pos.x,y:pos.y,w:item.w,h:item.h,
          fill:item.fill,border:item.border,name:item.name});
        rr({id:pid,rectId:item.id,groupId:item.groupId,x:pos.x,y:pos.y,
          w:item.w,h:item.h,fill:item.fill,border:item.border,name:item.name},board.id);
        placed++;done=true;
      }
    }
    if(!done)failed.push(item.name);
  }

  clrSel();renderSidebar();updateStats();
  if(failed.length)toast('⚠ 配置不可: '+failed.join(', '));
  else toast('⚡ '+grp.fileName.match(/\d{8}/)?.[0]||grp.fileName+' — '+placed+'個を自動配置');
}

/* ══════════════════════════════════════════════════════
   AUTO PLACE  —  4パターン対応
   pattern: 'wide' | 'tall' | 'square' | 'balance'
══════════════════════════════════════════════════════ */
function autoPlace(){
  if(!rects.length){toast('CSVを読み込んでください');return}
  ap().forEach(p=>rmEl(p.id));boards=[];nextPlacedId=1;nextBoardId=1;clrSel();

  const sgs=[...csvGroups].sort((a,b)=>a.priority-b.priority);
  eb(nextBoardId++);

  const boardShelf={};
  function getShelf(bid){
    if(!boardShelf[bid])boardShelf[bid]={shelfX:0,shelfY:0,shelfH:0,shelfBaseH:0,nextY:0};
    return boardShelf[bid];
  }

  for(let gi=0;gi<sgs.length;gi++){
    const grp=sgs[gi];
    // 最大辺降順ソート（大きい矩形から横長で詰める）
    const items=rects.filter(r=>r.groupId===grp.id).map(r=>({...r}))
      .sort((a,b)=>Math.max(b.w,b.h)-Math.max(a.w,a.h)||Math.min(b.w,b.h)-Math.min(a.w,a.h));

    // このグループの開始Y = 前グループBBoxの下端
    let groupStartY=0;
    if(gi>0){
      const prevPs=boards.flatMap(b=>b.placed).filter(p=>p.groupId===sgs[gi-1].id);
      if(prevPs.length)groupStartY=Math.max(...prevPs.map(p=>p.y+p.h))+RECT_MARGIN;
    }

    // 高さ比率: 棚の基準高さ×0.5以上でないと別棚へ
    // → サイズが揃った矩形のみ同じ行に並ぶ（省スペース）
    const HEIGHT_RATIO=0.5;

    for(const item of items){
      // 最大辺を横（幅）にする
      let pw=item.w, ph=item.h;
      if(ph>pw){pw=item.h;ph=item.w;}

      let done=false;
      for(let bi=0;bi<boards.length&&!done;bi++){
        const board=boards[bi];
        const sh=getShelf(board.id);
        const startY=gi===0?0:(bi===0?groupStartY:0);

        // 棚のYが開始Yより前なら開始Yに移動
        if(sh.shelfY<startY){
          sh.shelfX=0;sh.shelfY=startY;sh.shelfH=0;sh.shelfBaseH=0;sh.nextY=startY;
        }

        // 高さ比率チェック: 棚の基準高さ×HEIGHT_RATIO以上かどうか
        const heightOk=sh.shelfBaseH===0||ph>=sh.shelfBaseH*HEIGHT_RATIO;
        const widthOk=sh.shelfX+pw<=artboardW;
        const vertOk=sh.shelfY+ph<=artboardH;

        if(widthOk&&vertOk&&heightOk){
          // 現在の棚に配置
          const pid=nextPlacedId++;
          board.placed.push({id:pid,rectId:item.id,groupId:item.groupId,
            x:sh.shelfX,y:sh.shelfY,w:pw,h:ph,
            fill:item.fill,border:item.border,name:item.name});
          if(sh.shelfBaseH===0)sh.shelfBaseH=ph;
          sh.shelfH=Math.max(sh.shelfH,ph);
          sh.nextY=Math.max(sh.nextY,sh.shelfY+sh.shelfH);
          sh.shelfX+=pw+RECT_MARGIN;
          done=true;
        } else {
          // 次の棚へ
          const ny=sh.nextY+RECT_MARGIN;
          if(ny+ph<=artboardH){
            sh.shelfX=0;sh.shelfY=ny;sh.shelfH=ph;sh.shelfBaseH=ph;sh.nextY=ny+ph;
            const pid=nextPlacedId++;
            board.placed.push({id:pid,rectId:item.id,groupId:item.groupId,
              x:0,y:ny,w:pw,h:ph,
              fill:item.fill,border:item.border,name:item.name});
            sh.shelfX=pw+RECT_MARGIN;
            done=true;
          }
        }
      }

      if(!done){
        const newBid=nextBoardId++;eb(newBid);
        const board=boards[boards.length-1];
        const sh=getShelf(board.id);
        sh.shelfX=0;sh.shelfY=0;sh.shelfH=0;sh.shelfBaseH=0;sh.nextY=0;
        if(pw<=artboardW&&ph<=artboardH){
          const pid=nextPlacedId++;
          board.placed.push({id:pid,rectId:item.id,groupId:item.groupId,
            x:0,y:0,w:pw,h:ph,
            fill:item.fill,border:item.border,name:item.name});
          sh.shelfBaseH=ph;sh.shelfH=ph;sh.nextY=ph;sh.shelfX=pw+RECT_MARGIN;
          done=true;
        }
        if(!done)toast('配置不可: '+item.name);
      }
    }
  }

  while(boards.length<2)eb(nextBoardId++);
  renderBoards();renderSidebar();updateStats();
  toast('⚡ 自動配置完了 — '+ap().length+'個・'+boards.length+'ページ');
}

/* パターン別位置探索
   wide  : Y優先（行を埋めてから次の行）→ 横長BBox
   tall  : X優先（列を埋めてから次の列）→ 縦長BBox
   square: 候補点をBBoxアスペクト比1:1に近い順にソートして選択
   balance: 既存BLと同じ（面積隙間最小） */
function findPosWithPattern(item,placed,fz,pattern){
  const W=artboardW,H=artboardH;
  const ys=new Set([0]),xs=new Set([0]);
  const m=RECT_MARGIN;
  for(const p of placed){
    // 矩形の4辺からMARGIN分離れた位置も候補に（マージン付き配置の基準点）
    ys.add(p.y);ys.add(p.y+p.h);
    ys.add(p.y-m);ys.add(p.y+p.h+m);
    xs.add(p.x);xs.add(p.x+p.w);
    xs.add(p.x-m);xs.add(p.x+p.w+m);
  }
  for(const z of fz){ys.add(z.y);ys.add(z.y+z.h);xs.add(z.x);xs.add(z.x+z.w)}

  const sortedYs=[...ys].filter(y=>y>=0&&y+item.h<=H).sort((a,b)=>a-b);
  const sortedXs=[...xs].filter(x=>x>=0&&x+item.w<=W).sort((a,b)=>a-b);

  // 有効な候補点をすべて収集
  const candidates=[];
  for(const y of sortedYs){
    for(const x of sortedXs){
      if(x+item.w>W||y+item.h>H)continue;
      const c={x,y,w:item.w,h:item.h};
      if(placed.some(p=>ovlpM(c,p)))continue;
      if(fz.some(z=>ovlp(c,z)))continue;
      candidates.push({x,y});
    }
  }

  if(!candidates.length){
    // フルスキャンフォールバック
    for(let y=0;y<=H-item.h;y+=0.5){
      for(let x=0;x<=W-item.w;x+=0.5){
        const c={x:roundMm(x),y:roundMm(y),w:item.w,h:item.h};
        if(placed.some(p=>ovlpM(c,p)))continue;
        if(fz.some(z=>ovlp(c,z)))continue;
        return c;
      }
    }
    return null;
  }

  // パターンごとに候補をソートして最良位置を返す
  if(pattern==='wide'){
    candidates.sort((a,b)=>a.y-b.y||a.x-b.x);  // 行優先（横長）
  } else if(pattern==='tall'){
    candidates.sort((a,b)=>a.x-b.x||a.y-b.y);  // 列優先（縦長）
  } else if(pattern==='square'){
    // BBoxアスペクト比が1:1に近い候補を優先
    candidates.sort((a,b)=>{
      const score=pos=>{
        const bw=Math.max(...placed.map(p=>p.x+p.w),pos.x+item.w)-Math.min(...placed.map(p=>p.x),pos.x);
        const bh=Math.max(...placed.map(p=>p.y+p.h),pos.y+item.h)-Math.min(...placed.map(p=>p.y),pos.y);
        return bw>0&&bh>0?Math.min(bw,bh)/Math.max(bw,bh):0;
      };
      return score(b)-score(a);
    });
  } else {
    // balance: BL（Y小→X小）
    candidates.sort((a,b)=>a.y-b.y||a.x-b.x);
  }

  return candidates[0];
}

// findPosWithForbidden は findPosWithPattern に統合
function findPosWithForbidden(item,placed,fz){
  return findPosWithPattern(item,placed,fz,'balance');
}
function findFreePos(item,board){
  return findPosWithPattern(item,board.placed,[],'balance');
}

function cu(mm,u){if(u==='mm')return+mm.toFixed(4);if(u==='pt')return+(mm*2.8346).toFixed(4);return+(mm/0.2646).toFixed(4)}
function expFile(name,fmt,unit){
  const sorted=[...csvGroups].sort((a,b)=>a.priority-b.priority);

  // 矩形が1つも配置されていないボードはスキップ
  const filledBoards=boards.filter(b=>b.placed.length>0);
  if(!filledBoards.length){toast('配置済みの矩形がありません');return}

  // SVG/AI出力は常にpt単位（Illustratorとの最高互換性）
  // 内部mmをptに変換: 1mm = 2.834645pt
  const MM_TO_PT = 2.834645;
  function toPt(mm){return(mm*MM_TO_PT).toFixed(4)}

  // viewBox用: pt値（小数点なし）
  const vbW = (artboardW * MM_TO_PT).toFixed(3);
  const vbH = (artboardH * MM_TO_PT).toFixed(3);

  // ユーザー選択単位での表示サイズ（widthとheight属性用）
  const aw=cu(artboardW,unit),ah=cu(artboardH,unit),u=unit;

  filledBoards.forEach((board,idx)=>{
    const gs=sorted.map(grp=>{
      const gps=board.placed.filter(p=>p.groupId===grp.id);
      if(!gps.length)return'';
      const rs=gps.map(p=>{
        const x=toPt(p.x),y=toPt(p.y),w=toPt(p.w),h=toPt(p.h);
        const lbl=p.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const fs=(3.5*MM_TO_PT).toFixed(3); // フォントサイズ pt
        const cx=(parseFloat(x)+parseFloat(w)/2).toFixed(3);
        const cy=(parseFloat(y)+parseFloat(h)/2).toFixed(3);
        // dominant-baselineの代わりにdy属性でテキストを中央寄せ（AI互換）
        return [
          '  <rect x="'+x+'pt" y="'+y+'pt" width="'+w+'pt" height="'+h+'pt"',
          '    fill="'+p.fill+'" stroke="'+p.border+'" stroke-width="0.85pt"/>',
          '  <text x="'+cx+'pt" y="'+cy+'pt" dy="0.35em"',
          '    font-family="Helvetica, Arial, sans-serif" font-size="'+fs+'pt"',
          '    fill="'+p.border+'" text-anchor="middle">'+lbl+'</text>',
        ].join('\n');
      }).join('\\n');
      const gid=grp.fileName.replace(/[^a-zA-Z0-9_-]/g,'_');
      return'  <g id="'+gid+'" inkscape:label="'+grp.fileName+'">\n'+rs+'\n  </g>';
    }).filter(Boolean).join('\n');

    const sfx=filledBoards.length>1?'_p'+(idx+1):'';
    const ext=fmt==='ai'?'ai':'svg';

    let svg;
    if(fmt==='ai'){
      // Adobe Illustrator互換SVG
      // AIはviewBox座標系=pt、width/heightに実寸単位を指定
      svg=[
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"',
        '  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">',
        '<svg version="1.1"',
        '  xmlns="http://www.w3.org/2000/svg"',
        '  xmlns:xlink="http://www.w3.org/1999/xlink"',
        '  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"',
        '  xmlns:ai="http://ns.adobe.com/AdobeIllustrator/10.0/"',
        '  x="0pt" y="0pt"',
        '  width="'+aw+u+'" height="'+ah+u+'"',
        '  viewBox="0 0 '+vbW+' '+vbH+'"',
        '  xml:space="preserve">',
        '  <defs/>',
        '  <!-- RectPlacer export | artboard: '+artboardW+'x'+artboardH+'mm -->',
        '  <rect width="'+vbW+'pt" height="'+vbH+'pt" fill="#ffffff" stroke="none"/>',
        gs,
        '</svg>',
      ].join('\n');
    } else {
      // 標準SVG（ブラウザ・Illustrator両対応）
      svg=[
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<svg version="1.1"',
        '  xmlns="http://www.w3.org/2000/svg"',
        '  xmlns:xlink="http://www.w3.org/1999/xlink"',
        '  width="'+aw+u+'" height="'+ah+u+'"',
        '  viewBox="0 0 '+vbW+' '+vbH+'">',
        '  <!-- RectPlacer export | artboard: '+artboardW+'x'+artboardH+'mm -->',
        '  <rect width="'+vbW+'pt" height="'+vbH+'pt" fill="#ffffff" stroke="none"/>',
        gs,
        '</svg>',
      ].join('\n');
    }

    if(fmt==='jpg'||fmt==='pdf'){
      // SVGをCanvasに描画してJPG/PDFに変換
      const DPI=150; // 出力解像度
      const PX_PER_MM=DPI/25.4;
      const cw=Math.round(artboardW*PX_PER_MM);
      const ch=Math.round(artboardH*PX_PER_MM);
      const canvas=document.createElement('canvas');
      canvas.width=cw;canvas.height=ch;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,cw,ch);
      const img=new Image();
      const svgBlob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
      const svgUrl=URL.createObjectURL(svgBlob);
      img.onload=()=>{
        ctx.drawImage(img,0,0,cw,ch);
        URL.revokeObjectURL(svgUrl);
        if(fmt==='jpg'){
          const jpgUrl=canvas.toDataURL('image/jpeg',0.92);
          const a=document.createElement('a');
          a.href=jpgUrl;a.download=name+sfx+'.jpg';
          document.body.appendChild(a);a.click();document.body.removeChild(a);
        } else {
          // PDF: SVGをPDFラッパーで包む（Acrobat/プレビューで開ける）
          const jpgData=canvas.toDataURL('image/jpeg',0.95);
          const jpgBase64=jpgData.split(',')[1];
          // A4換算: 1mm=2.834645pt
          const MM2PT=2.834645;
          const pw=(artboardW*MM2PT).toFixed(2);
          const ph=(artboardH*MM2PT).toFixed(2);
          // 簡易PDFをバイナリで生成
          const pdfContent=buildSimplePDF(jpgBase64,cw,ch,parseFloat(pw),parseFloat(ph));
          const pdfBlob=new Blob([pdfContent],{type:'application/pdf'});
          const pdfUrl=URL.createObjectURL(pdfBlob);
          const a=document.createElement('a');
          a.href=pdfUrl;a.download=name+sfx+'.pdf';
          document.body.appendChild(a);a.click();
          document.body.removeChild(a);URL.revokeObjectURL(pdfUrl);
        }
      };
      img.src=svgUrl;
    } else {
      const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=name+sfx+'.'+ext;
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);URL.revokeObjectURL(url);
    }
  });
  toast(filledBoards.length+'ファイルをダウンロードしました');
}

// 簡易PDF生成（JPG埋め込み）

  // PDFオブジェクト構築

  let pos=0;
  const w=s=>{pos+=s.length;return s};
  let out='%PDF-1.4\n%\xFF\xFF\xFF\xFF\n';
  pos=out.l
