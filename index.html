<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RectPlacer — アートボード配置ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --surface2: #231f2e;
    --border: #332d42;
    --accent: #c8ff57;
    --accent2: #7b5ea7;
    --text: #e8e4f0;
    --muted: #7a7488;
    --danger: #ff5757;
    --warn: #ffaa00;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── LAYOUT ─────────────────────────────── */
  #app { display: flex; height: 100vh; width: 100vw; }

  /* LEFT PANEL */
  #sidebar {
    width: 280px; min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  #sidebar-header p { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* RECT LIST */
  #rect-list-wrap {
    flex: 1; overflow-y: auto; padding: 12px;
  }
  #rect-list-wrap::-webkit-scrollbar { width: 4px; }
  #rect-list-wrap::-webkit-scrollbar-track { background: transparent; }
  #rect-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section-label {
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    padding: 8px 4px 6px; font-weight: 500;
  }

  .rect-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; margin-bottom: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: grab;
    transition: border-color .15s, background .15s;
    user-select: none;
  }
  .rect-item:hover { border-color: var(--accent2); background: #2a2538; }
  .rect-item.placed { border-color: #3d3550; opacity: .6; }
  .rect-item.dragging-from-list { opacity: .4; }

  .rect-color-swatch {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  }
  .rect-item-info { flex: 1; min-width: 0; }
  .rect-item-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rect-item-dims { font-size: 9px; color: var(--muted); margin-top: 1px; }

  .placed-badge {
    font-size: 8px; padding: 1px 5px;
    background: var(--accent2); color: #fff;
    border-radius: 10px; letter-spacing: .5px;
  }

  /* BOTTOM PANEL */
  #sidebar-bottom {
    border-top: 1px solid var(--border);
    padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }

  /* STATS */
  #stats-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .stat-row { display: flex; justify-content: space-between; align-items: baseline; }
  .stat-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .stat-val { font-size: 16px; font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); }
  .stat-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* BUTTONS */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    border: 1px solid var(--border);
    cursor: pointer; transition: all .15s;
    background: var(--surface2); color: var(--text);
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.accent { background: var(--accent); color: #0f0e11; border-color: var(--accent); font-weight: 600; }
  .btn.accent:hover { background: #aadd44; }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-row { display: flex; gap: 6px; }

  /* FILE INPUT */
  #csv-label {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 6px;
    font-size: 11px; border: 1px dashed var(--border);
    cursor: pointer; transition: all .15s;
    color: var(--muted); justify-content: center;
  }
  #csv-label:hover { border-color: var(--accent); color: var(--accent); }
  #csv-input { display: none; }

  /* ARTBOARD AREA */
  #canvas-area {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg);
    overflow: hidden; position: relative;
  }

  #toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  #toolbar .tbar-label { font-size: 9px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  #toolbar input[type=number] {
    width: 70px; padding: 5px 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px;
  }
  #toolbar input[type=number]:focus { outline: none; border-color: var(--accent); }
  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* CANVAS VIEWPORT */
  #viewport {
    flex: 1; overflow: auto; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #viewport::-webkit-scrollbar { width: 6px; height: 6px; }
  #viewport::-webkit-scrollbar-track { background: var(--bg); }
  #viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #scene {
    position: relative;
    flex-shrink: 0;
    margin: 40px;
  }

  #artboard {
    position: absolute; top: 0; left: 0;
    background: #ffffff;
    box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,.6);
  }

  /* PLACED RECTS */
  .placed-rect {
    position: absolute;
    border: 2px solid transparent;
    border-radius: 2px;
    cursor: grab;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    transition: box-shadow .12s;
    user-select: none;
  }
  .placed-rect:hover { z-index: 50 !important; box-shadow: 0 0 0 2px var(--accent); }
  .placed-rect.selected { box-shadow: 0 0 0 2.5px var(--accent) !important; z-index: 100 !important; }
  .placed-rect.dragging { opacity: .82; cursor: grabbing; z-index: 200 !important; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  .placed-rect.collision { box-shadow: 0 0 0 2.5px var(--danger) !important; }
  .rect-label {
    font-size: 9px; font-family: 'DM Mono', monospace;
    color: rgba(0,0,0,.65); pointer-events: none;
    text-align: center; padding: 2px 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }

  /* GHOST RECT during list-drag */
  #ghost-rect {
    position: fixed; pointer-events: none;
    background: rgba(200,255,87,.25);
    border: 2px solid var(--accent);
    border-radius: 2px;
    display: none; z-index: 9999;
  }

  /* ROTATE BUTTON floating */
  #rotate-btn {
    position: fixed; z-index: 500;
    display: none;
    background: var(--accent); color: #0f0e11;
    border: none; border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 14px; cursor: pointer;
    box-shadow: 0 2px 10px rgba(0,0,0,.5);
    align-items: center; justify-content: center;
    transition: transform .15s;
  }
  #rotate-btn:hover { transform: scale(1.1) rotate(20deg); }
  #rotate-btn.visible { display: flex; }

  /* TOTAL AREA FLOATING BADGE */
  #area-badge {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    z-index: 300;
    pointer-events: none;
    backdrop-filter: blur(8px);
  }
  #area-badge .ab-label { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  #area-badge .ab-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }
  #area-badge .ab-unit { font-size: 10px; color: var(--muted); }

  /* EXPORT MODAL */
  #export-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 1000;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #export-modal.open { display: flex; }
  #export-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px; min-width: 360px;
    max-width: 420px;
  }
  #export-dialog h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .form-group select, .form-group input[type=text] {
    width: 100%; padding: 8px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 12px;
  }
  .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 8px 18px; border-radius: 20px; font-size: 11px;
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 2000;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* EMPTY STATE */
  #empty-hint {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none; color: var(--muted); gap: 8px; font-size: 12px;
  }
  #empty-hint .icon { font-size: 32px; opacity: .3; }

  /* SNAP INDICATOR */
  .snap-line {
    position: absolute; background: var(--accent);
    opacity: .5; pointer-events: none; z-index: 150;
  }
</style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>RectPlacer</h1>
      <p>矩形アートボード配置ツール</p>
    </div>

    <div id="rect-list-wrap">
      <div class="section-label">矩形リスト</div>
      <div id="rect-list"></div>
    </div>

    <div id="sidebar-bottom">
      <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:4px 2px 6px">配置面積（BBox）</div>
      <div id="stats-bar">
        <div class="stat-row">
          <span class="stat-label">配置済み面積</span>
          <span class="stat-val" id="stat-area">0</span>
        </div>
        <div class="stat-sub" id="stat-sub">0 / 0 個配置 — mm²</div>
      </div>
      <label id="csv-label" for="csv-input">
        <span>📂</span> CSVを読み込む
      </label>
      <input type="file" id="csv-input" accept=".csv,text/csv">
      <div class="btn-row">
        <button class="btn danger" id="clear-btn" style="flex:1">🗑 クリア</button>
        <button class="btn accent" id="export-btn" style="flex:1">↑ エクスポート</button>
      </div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <div id="toolbar">
      <span class="tbar-label">アートボード</span>
      <input type="number" id="ab-w" value="1088" min="1" max="10000" step="0.1"> × 
      <input type="number" id="ab-h" value="738" min="1" max="10000" step="0.1">
      <span style="font-size:10px;color:var(--muted)">mm</span>
      <button class="btn" id="apply-ab-btn">適用</button>
      <div class="sep"></div>
      <span class="tbar-label">スナップ距離</span>
      <input type="number" id="snap-dist" value="5" min="0" max="50" step="0.5" style="width:60px">
      <span style="font-size:10px;color:var(--muted)">mm</span>
      <div class="sep"></div>
      <button class="btn" id="rotate-selected-btn" title="選択矩形を90°回転">↻ 回転</button>
    </div>

    <div id="viewport">
      <div id="scene">
        <div id="artboard"></div>
        <div id="empty-hint">
          <div class="icon">⬜</div>
          <div>CSVを読み込んで矩形をドラッグ配置</div>
          <div style="font-size:10px;opacity:.6">name, width(mm), height(mm)</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ROTATE FLOATING BTN -->
<button id="rotate-btn" title="90°回転">↻</button>

<!-- AREA FLOATING BADGE -->
<div id="area-badge">
  <div class="ab-label">配置面積（BBox）</div>
  <div id="badge-groups"></div>
</div>

<!-- GHOST -->
<div id="ghost-rect"></div>

<!-- EXPORT MODAL -->
<div id="export-modal">
  <div id="export-dialog">
    <h2>エクスポート設定</h2>
    <div class="form-group">
      <label>ファイル名</label>
      <input type="text" id="export-name" value="artboard">
    </div>
    <div class="form-group">
      <label>フォーマット</label>
      <select id="export-fmt">
        <option value="svg">SVG</option>
        <option value="ai">AI (SVG ベース)</option>
      </select>
    </div>
    <div class="form-group">
      <label>単位</label>
      <select id="export-unit">
        <option value="mm" selected>mm</option>
        <option value="pt">pt</option>
        <option value="px">px</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" id="cancel-export" style="flex:1">キャンセル</button>
      <button class="btn accent" id="do-export" style="flex:1">ダウンロード</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   UNIT SYSTEM
   Internal unit = mm. Screen rendering uses px at a scale factor.
   1mm = MM_TO_PX px on screen (adjustable via zoom).
═══════════════════════════════════════════════════════ */
const MM_TO_PX = 1.5;  // screen scale: 1mm → 1.5px (adjustable)
function mmToPx(mm) { return mm * MM_TO_PX; }
function pxToMm(px) { return px / MM_TO_PX; }
function roundMm(v, decimals=2) { return Math.round(v * 10**decimals) / 10**decimals; }

/* ═══════════════════════════════════════════════════════
   STATE  (all coordinates/sizes in mm)
═══════════════════════════════════════════════════════ */
let csvGroups = [];  // { id, fileName, fill, border }
let rects = [];     // { id, groupId, name, w, h, fill, border }
let placed = [];    // { id, rectId, groupId, x, y, w, h, fill, border, name }
let selectedId = null;
let artboardW = 1088, artboardH = 738;  // mm
let snapDist = 5;   // mm
let nextPlacedId = 1;
let nextGroupId = 1;

const GROUP_PALETTE = [
  { fill: '#ffc2c2', border: '#c03030' },
  { fill: '#b8d4ff', border: '#2a60c0' },
  { fill: '#b8f5c0', border: '#208a38' },
  { fill: '#fff0a0', border: '#b08000' },
  { fill: '#e0c0ff', border: '#8030c0' },
  { fill: '#ffd0a0', border: '#c05010' },
  { fill: '#a8f0f8', border: '#0880a0' },
  { fill: '#ffb8e0', border: '#c0208a' },
  { fill: '#c8f0a0', border: '#407820' },
  { fill: '#c0c8ff', border: '#2030a8' },
];
let groupPaletteIdx = 0;
function nextGroupPalette() { return GROUP_PALETTE[groupPaletteIdx++ % GROUP_PALETTE.length]; }

/* ═══════════════════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════════════════ */
const artboard = document.getElementById('artboard');
const scene = document.getElementById('scene');
const rectListEl = document.getElementById('rect-list');
const rotateBtn = document.getElementById('rotate-btn');
const emptyHint = document.getElementById('empty-hint');
const ghostEl = document.getElementById('ghost-rect');
const viewport = document.getElementById('viewport');

/* ═══════════════════════════════════════════════════════
   ARTBOARD SETUP
═══════════════════════════════════════════════════════ */
function applyArtboard() {
  const wPx = mmToPx(artboardW);
  const hPx = mmToPx(artboardH);
  artboard.style.width  = wPx + 'px';
  artboard.style.height = hPx + 'px';
  scene.style.width  = wPx + 'px';
  scene.style.height = hPx + 'px';
}

document.getElementById('apply-ab-btn').onclick = () => {
  artboardW = parseFloat(document.getElementById('ab-w').value) || 1088;
  artboardH = parseFloat(document.getElementById('ab-h').value) || 738;
  applyArtboard();
  // re-render all placed rects (positions stay in mm, just repaint)
  placed.forEach(p => renderPlacedRect(p));
};
document.getElementById('snap-dist').onchange = e => { snapDist = parseFloat(e.target.value) || 5; };

applyArtboard();

/* ═══════════════════════════════════════════════════════
   CSV IMPORT  (quoted CSV, cols: 0=フォルダ,1=ファイル名,2=レイヤー,
               3=番号,4=種類,5=横mm,6=縦mm,7=横pt,8=縦pt)
═══════════════════════════════════════════════════════ */
function parseQuotedCSV(text) {
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur);
    rows.push(cols.map(s => s.trim()));
  }
  return rows;
}

function loadCsvText(text, fileName) {
  const rows = parseQuotedCSV(text);
  if (!rows.length) return 0;

  const pal = nextGroupPalette();
  const group = { id: nextGroupId++, fileName, fill: pal.fill, border: pal.border };
  csvGroups.push(group);

  let loaded = 0;
  for (let i = 0; i < rows.length; i++) {
    const cols = rows[i];
    if (cols.length < 7) continue;
    // Skip header row (col[5] is not a number)
    if (isNaN(parseFloat(cols[5]))) continue;
    // Skip "オブジェクトなし" rows
    if ((cols[4] || '').includes('なし')) continue;
    const w = parseFloat(cols[5]);
    const h = parseFloat(cols[6]);
    if (isNaN(w) || isNaN(h) || w <= 0 || h <= 0) continue;
    // Name: ファイル名(URL-decoded, .ai除去) + "#" + オブジェクト番号
    let baseName = (cols[1] || '');
    try { baseName = decodeURIComponent(baseName); } catch(e) {}
    baseName = baseName.replace(/\.ai$/i, '');
    const objNum = cols[3] || String(loaded + 1);
    const name = `${baseName}#${objNum}`;
    rects.push({
      id: Date.now() + Math.random(),
      groupId: group.id,
      name, w: roundMm(w), h: roundMm(h),
      fill: group.fill, border: group.border
    });
    loaded++;
  }
  return loaded;
}

document.getElementById('csv-input').onchange = function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const loaded = loadCsvText(ev.target.result, file.name);
    renderSidebar();
    updateStats();
    if (loaded > 0) {
      showToast(`「${file.name}」から ${loaded} 個の矩形を読み込みました`);
      emptyHint.style.display = 'none';
    } else {
      showToast(`⚠ 「${file.name}」から矩形データが見つかりませんでした`);
    }
  };
  reader.readAsText(file, 'UTF-8');
  this.value = '';
};

/* ═══════════════════════════════════════════════════════
   SIDEBAR RENDER  (grouped by CSV)
═══════════════════════════════════════════════════════ */
function renderSidebar() {
  rectListEl.innerHTML = '';
  if (!rects.length) {
    rectListEl.innerHTML = '<div style="font-size:10px;color:var(--muted);padding:8px 4px">CSVを読み込んでください</div>';
    return;
  }

  // Group rects by csvGroup
  csvGroups.forEach(grp => {
    const groupRects = rects.filter(r => r.groupId === grp.id);
    if (!groupRects.length) return;

    // Group header
    const header = document.createElement('div');
    header.style.cssText = `
      display:flex; align-items:center; gap:6px;
      padding: 6px 4px 4px;
      margin-top: 8px;
      border-bottom: 2px solid ${grp.border};
    `;
    header.innerHTML = `
      <div style="width:10px;height:10px;border-radius:2px;background:${grp.fill};border:1.5px solid ${grp.border};flex-shrink:0"></div>
      <span style="font-size:9px;color:${grp.border};letter-spacing:1px;text-transform:uppercase;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${grp.fileName}</span>
    `;
    rectListEl.appendChild(header);

    groupRects.forEach(r => {
      const isPlaced = placed.some(p => p.rectId === r.id);
      const div = document.createElement('div');
      div.className = 'rect-item' + (isPlaced ? ' placed' : '');
      div.dataset.rectId = r.id;
      div.style.borderColor = isPlaced ? grp.border + '55' : grp.border + 'aa';
      div.innerHTML = `
        <div class="rect-color-swatch" style="background:${grp.fill};border:1.5px solid ${grp.border}"></div>
        <div class="rect-item-info">
          <div class="rect-item-name">${r.name}</div>
          <div class="rect-item-dims">${r.w} × ${r.h} mm</div>
        </div>
        ${isPlaced ? '<span class="placed-badge" style="background:' + grp.border + '">配置済</span>' : ''}
      `;
      div.addEventListener('mousedown', e => startListDrag(e, r));
      rectListEl.appendChild(div);
    });
  });
}

/* ═══════════════════════════════════════════════════════
   STATS UPDATE
   面積 = グループごとの配置済み矩形群のバウンディングボックス面積
═══════════════════════════════════════════════════════ */
function calcGroupBbox(groupId) {
  const ps = placed.filter(p => p.groupId === groupId);
  if (!ps.length) return null;
  const minX = Math.min(...ps.map(p => p.x));
  const minY = Math.min(...ps.map(p => p.y));
  const maxX = Math.max(...ps.map(p => p.x + p.w));
  const maxY = Math.max(...ps.map(p => p.y + p.h));
  return { w: maxX - minX, h: maxY - minY, area: (maxX - minX) * (maxY - minY) };
}

function updateStats() {
  const statsBar = document.getElementById('stats-bar');
  const badgeGroups = document.getElementById('badge-groups');
  statsBar.innerHTML = '';

        <span class="stat-val">0</span>
      </div>
      <div class="stat-sub">${totalPlaced} / ${totalRects} 個配置 — mm²</div>
    `;
    if (badgeGroups) badgeGroups.innerHTML = '';
    return;
  }

  let badgeHTML = '';
  csvGroups.forEach(grp => {
    const bbox = calcGroupBbox(grp.id);
    const gPlaced = placed.filter(p => p.groupId === grp.id).length;
    const gTotal  = rects.filter(r => r.groupId === grp.id).length;
    if (!gTotal) return;

    const areaStr = bbox ? Math.round(bbox.area).toLocaleString('ja-JP') : '—';
    const wStr    = bbox ? bbox.w.toFixed(1) : '—';
    const hStr    = bbox ? bbox.h.toFixed(1) : '—';

    statsBar.innerHTML += `
      <div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
          <div style="width:8px;height:8px;border-radius:1px;background:${grp.fill};border:1.5px solid ${grp.border};flex-shrink:0"></div>
          <span style="font-size:9px;color:${grp.border};font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px">${grp.fileName}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="font-size:9px;color:var(--muted)">BBox面積</span>
          <span style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:${grp.border}">${areaStr}</span>
        </div>
        <div style="font-size:9px;color:var(--muted);margin-top:1px">${wStr} × ${hStr} mm — ${gPlaced}/${gTotal}個</div>
      </div>
    `;

    badgeHTML += `<div style="display:flex;align-items:center;gap:6px;margin-top:4px">
      <div style="width:8px;height:8px;border-radius:1px;background:${grp.fill};border:1.5px solid ${grp.border};flex-shrink:0"></div>
      <span style="font-size:10px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${grp.fileName.replace(/\.csv$/i,'')}</span>
      <span style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:${grp.border}">${areaStr} mm²</span>
    </div>`;
  });

  if (badgeGroups) badgeGroups.innerHTML = badgeHTML;
}

/* ═══════════════════════════════════════════════════════
   COLLISION DETECTION
═══════════════════════════════════════════════════════ */
function rectsOverlap(a, b) {
  return !(a.x + a.w <= b.x || b.x + b.w <= a.x ||
           a.y + a.h <= b.y || b.y + b.h <= a.y);
}

function hasCollision(candidate, excludeId = null) {
  for (const p of placed) {
    if (p.id === excludeId) continue;
    if (rectsOverlap(candidate, p)) return true;
  }
  return false;
}

function isInBounds(r) {
  return r.x >= 0 && r.y >= 0 && r.x + r.w <= artboardW && r.y + r.h <= artboardH;
}

/* ═══════════════════════════════════════════════════════
   SNAP TO CORNERS
   Find nearest corner-alignment among placed rects
═══════════════════════════════════════════════════════ */
function snapToCorners(candidate, excludeId = null) {
  let best = null, bestDist = Infinity;

  // The 4 corners of candidate: TL, TR, BL, BR
  // Each can snap to a corner of another rect
  const candCorners = [
    { dx: 0,         dy: 0 },          // TL
    { dx: -candidate.w, dy: 0 },       // TR→TL
    { dx: 0,         dy: -candidate.h },// BL→TL
    { dx: -candidate.w, dy: -candidate.h }, // BR→TL
  ];

  for (const p of placed) {
    if (p.id === excludeId) continue;
    // corners of p: TL, TR, BL, BR
    const pCorners = [
      { x: p.x,       y: p.y },
      { x: p.x + p.w, y: p.y },
      { x: p.x,       y: p.y + p.h },
      { x: p.x + p.w, y: p.y + p.h },
    ];
    for (const pc of pCorners) {
      for (const cc of candCorners) {
        const nx = pc.x + cc.dx;
        const ny = pc.y + cc.dy;
        const dist = Math.hypot(candidate.x - nx, candidate.y - ny);
        if (dist < snapDist && dist < bestDist) {
          const snapped = { ...candidate, x: nx, y: ny };
          if (!hasCollision(snapped, excludeId) && isInBounds(snapped)) {
            best = { x: nx, y: ny };
            bestDist = dist;
          }
        }
      }
    }
  }
  return best;
}

/* ═══════════════════════════════════════════════════════
   DRAG FROM SIDEBAR
═══════════════════════════════════════════════════════ */
let listDragState = null;

function startListDrag(e, rect) {
  e.preventDefault();
  ghostEl.style.display = 'block';
  ghostEl.style.width  = mmToPx(rect.w) + 'px';
  ghostEl.style.height = mmToPx(rect.h) + 'px';
  ghostEl.style.left = (e.clientX - mmToPx(rect.w)/2) + 'px';
  ghostEl.style.top  = (e.clientY - mmToPx(rect.h)/2) + 'px';

  listDragState = { rect };

  document.addEventListener('mousemove', onListDragMove);
  document.addEventListener('mouseup', onListDragUp);
}

function onListDragMove(e) {
  if (!listDragState) return;
  const r = listDragState.rect;
  ghostEl.style.left = (e.clientX - mmToPx(r.w)/2) + 'px';
  ghostEl.style.top  = (e.clientY - mmToPx(r.h)/2) + 'px';
}

function onListDragUp(e) {
  document.removeEventListener('mousemove', onListDragMove);
  document.removeEventListener('mouseup', onListDragUp);
  ghostEl.style.display = 'none';

  const r = listDragState.rect;
  listDragState = null;

  // Check if drop is over artboard
  const abRect = artboard.getBoundingClientRect();
  if (e.clientX < abRect.left || e.clientX > abRect.right ||
      e.clientY < abRect.top  || e.clientY > abRect.bottom) return;

  // Convert screen px → mm
  let x = pxToMm(e.clientX - abRect.left - mmToPx(r.w)/2);
  let y = pxToMm(e.clientY - abRect.top  - mmToPx(r.h)/2);
  x = roundMm(Math.max(0, Math.min(artboardW - r.w, x)));
  y = roundMm(Math.max(0, Math.min(artboardH - r.h, y)));

  // Snap to corners
  const snap = snapToCorners({ x, y, w: r.w, h: r.h });
  if (snap) { x = snap.x; y = snap.y; }

  const candidate = { x, y, w: r.w, h: r.h };
  if (hasCollision(candidate)) {
    showToast('⚠ 他の矩形と重なっています。位置を調整してください');
  }

  const pid = nextPlacedId++;
  const p = { id: pid, rectId: r.id, groupId: r.groupId, x, y, w: r.w, h: r.h, fill: r.fill, border: r.border, name: r.name };
  placed.push(p);
  renderPlacedRect(p);
  renderSidebar();
  updateStats();
  selectRect(pid);
}

/* ═══════════════════════════════════════════════════════
   RENDER PLACED RECT  (mm → px for screen)
═══════════════════════════════════════════════════════ */
function renderPlacedRect(p) {
  let el = document.getElementById('placed-' + p.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'placed-' + p.id;
    el.className = 'placed-rect';
    el.innerHTML = `<span class="rect-label">${p.name}</span>`;
    artboard.appendChild(el);
    el.addEventListener('mousedown', e => startBoardDrag(e, p.id));
  }
  el.style.left       = mmToPx(p.x) + 'px';
  el.style.top        = mmToPx(p.y) + 'px';
  el.style.width      = mmToPx(p.w) + 'px';
  el.style.height     = mmToPx(p.h) + 'px';
  el.style.background = p.fill;
  el.style.borderColor = p.border;
  el.style.transform  = '';
}

function removePlacedEl(id) {
  const el = document.getElementById('placed-' + id);
  if (el) el.remove();
}

/* ═══════════════════════════════════════════════════════
   SELECT
═══════════════════════════════════════════════════════ */
function selectRect(id) {
  // deselect old
  if (selectedId) {
    const old = document.getElementById('placed-' + selectedId);
    if (old) old.classList.remove('selected');
  }
  selectedId = id;
  if (id) {
    const el = document.getElementById('placed-' + id);
    if (el) el.classList.add('selected');
    showRotateBtn(el);
  } else {
    hideRotateBtn();
  }
}

artboard.addEventListener('mousedown', e => {
  if (e.target === artboard) {
    selectRect(null);
  }
});

/* ═══════════════════════════════════════════════════════
   ROTATE
═══════════════════════════════════════════════════════ */
function rotateRect(id) {
  const p = placed.find(p => p.id === id);
  if (!p) return;
  // Swap w and h, adjust position to keep top-left
  const newW = p.h, newH = p.w;
  const newX = p.x, newY = p.y;

  // Check bounds after rotation
  if (newX + newW > artboardW || newY + newH > artboardH) {
    // try to adjust
    const adjX = Math.min(newX, artboardW - newW);
    const adjY = Math.min(newY, artboardH - newH);
    if (adjX < 0 || adjY < 0) { showToast('回転後にアートボードからはみ出します'); return; }
    p.x = Math.max(0, adjX); p.y = Math.max(0, adjY);
  }

  const candidate = { x: p.x, y: p.y, w: newW, h: newH };
  if (hasCollision(candidate, id)) {
    showToast('⚠ 回転後に他の矩形と重なります'); return;
  }

  p.w = newW; p.h = newH;
  renderPlacedRect(p);
  updateStats();
  const el = document.getElementById('placed-' + id);
  showRotateBtn(el);
}

function showRotateBtn(el) {
  if (!el) return;
  const rect = el.getBoundingClientRect();
  rotateBtn.style.left = (rect.right - 16) + 'px';
  rotateBtn.style.top  = (rect.top - 16) + 'px';
  rotateBtn.classList.add('visible');
}
function hideRotateBtn() {
  rotateBtn.classList.remove('visible');
}

rotateBtn.onclick = () => { if (selectedId) rotateRect(selectedId); };
document.getElementById('rotate-selected-btn').onclick = () => { if (selectedId) rotateRect(selectedId); };

/* ═══════════════════════════════════════════════════════
   DRAG ON ARTBOARD  (all in mm)
═══════════════════════════════════════════════════════ */
let boardDragState = null;

function startBoardDrag(e, id) {
  e.preventDefault(); e.stopPropagation();
  selectRect(id);
  const p = placed.find(p => p.id === id);
  if (!p) return;
  const abRect = artboard.getBoundingClientRect();
  // offset in mm from rect TL to mouse
  const offsetX = pxToMm(e.clientX - abRect.left) - p.x;
  const offsetY = pxToMm(e.clientY - abRect.top)  - p.y;
  boardDragState = { id, offsetX, offsetY, origX: p.x, origY: p.y };
  const el = document.getElementById('placed-' + id);
  el.classList.add('dragging');
  hideRotateBtn();
  document.addEventListener('mousemove', onBoardDragMove);
  document.addEventListener('mouseup', onBoardDragUp);
}

function onBoardDragMove(e) {
  if (!boardDragState) return;
  const { id, offsetX, offsetY } = boardDragState;
  const p = placed.find(p => p.id === id);
  if (!p) return;
  const abRect = artboard.getBoundingClientRect();

  let x = roundMm(pxToMm(e.clientX - abRect.left) - offsetX);
  let y = roundMm(pxToMm(e.clientY - abRect.top)  - offsetY);
  x = Math.max(0, Math.min(artboardW - p.w, x));
  y = Math.max(0, Math.min(artboardH - p.h, y));

  const snap = snapToCorners({ x, y, w: p.w, h: p.h }, id);
  if (snap) { x = snap.x; y = snap.y; }

  p.x = x; p.y = y;
  const el = document.getElementById('placed-' + id);
  el.style.left = mmToPx(x) + 'px';
  el.style.top  = mmToPx(y) + 'px';

  const collision = hasCollision({ x, y, w: p.w, h: p.h }, id);
  el.classList.toggle('collision', collision);
}

function onBoardDragUp(e) {
  document.removeEventListener('mousemove', onBoardDragMove);
  document.removeEventListener('mouseup', onBoardDragUp);
  if (!boardDragState) return;
  const { id } = boardDragState;
  const p = placed.find(p => p.id === id);
  const el = document.getElementById('placed-' + id);
  if (el) {
    el.classList.remove('dragging', 'collision');
    if (p && hasCollision({ x: p.x, y: p.y, w: p.w, h: p.h }, id)) {
      p.x = boardDragState.origX; p.y = boardDragState.origY;
      el.style.left = mmToPx(p.x) + 'px';
      el.style.top  = mmToPx(p.y) + 'px';
      showToast('⚠ 他の矩形と重なるため元の位置に戻しました');
    }
    showRotateBtn(el);
  }
  boardDragState = null;
}

/* ═══════════════════════════════════════════════════════
   CLEAR
═══════════════════════════════════════════════════════ */
document.getElementById('clear-btn').onclick = () => {
  if (!placed.length && !rects.length && !csvGroups.length) return;
  placed.forEach(p => removePlacedEl(p.id));
  placed = [];
  rects = [];
  csvGroups = [];
  groupPaletteIdx = 0;
  selectedId = null;
  hideRotateBtn();
  renderSidebar();
  updateStats();
  emptyHint.style.display = 'flex';
  showToast('クリアしました');
};

/* ═══════════════════════════════════════════════════════
   EXPORT  (internal unit is mm; convert if needed)
═══════════════════════════════════════════════════════ */
document.getElementById('export-btn').onclick = () => {
  document.getElementById('export-modal').classList.add('open');
};
document.getElementById('cancel-export').onclick = () => {
  document.getElementById('export-modal').classList.remove('open');
};
document.getElementById('do-export').onclick = () => {
  const name = document.getElementById('export-name').value || 'artboard';
  const fmt  = document.getElementById('export-fmt').value;
  const unit = document.getElementById('export-unit').value;
  exportFile(name, fmt, unit);
  document.getElementById('export-modal').classList.remove('open');
};

function convertUnit(mm, unit) {
  if (unit === 'mm') return +mm.toFixed(4);
  if (unit === 'pt') return +(mm * 2.8346).toFixed(4);  // 1mm = 2.8346pt
  if (unit === 'px') return +(mm / 0.2646).toFixed(4);  // 1mm = 3.7795px
  return mm;
}

function exportFile(name, fmt, unit) {
  const aw = convertUnit(artboardW, unit);
  const ah = convertUnit(artboardH, unit);
  const u = unit;

  // Group placed rects by csvGroup for layered output
  const groupedSvg = csvGroups.map(grp => {
    const gPlaced = placed.filter(p => p.groupId === grp.id);
    if (!gPlaced.length) return '';
    const groupRects = gPlaced.map(p => {
      const x = convertUnit(p.x, unit);
      const y = convertUnit(p.y, unit);
      const w = convertUnit(p.w, unit);
      const h = convertUnit(p.h, unit);
      const label = p.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const fontSize = convertUnit(3.5, unit);
      return `    <rect x="${x}${u}" y="${y}${u}" width="${w}${u}" height="${h}${u}" fill="${p.fill}" stroke="${p.border}" stroke-width="0.3${u}"/>
    <text x="${(x+w/2).toFixed(4)}${u}" y="${(y+h/2).toFixed(4)}${u}" font-family="monospace" font-size="${fontSize}${u}" fill="${p.border}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
    }).join('\n');
    return `  <g id="csv-${grp.id}" inkscape:label="${grp.fileName}">\n${groupRects}\n  </g>`;
  }).join('\n');

  let svg = '';
  if (fmt === 'ai') {
    svg = `<?xml version="1.0" encoding="utf-8"?>
<!-- Adobe Illustrator compatible SVG — unit: ${u} -->
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  xmlns:i="http://ns.adobe.com/AdobeIllustrator/10.0/"
  x="0${u}" y="0${u}" width="${aw}${u}" height="${ah}${u}"
  viewBox="0 0 ${aw} ${ah}"
  xml:space="preserve">
<defs/>
<rect width="${aw}${u}" height="${ah}${u}" fill="white"/>
${groupedSvg}
</svg>`;
  } else {
    svg = `<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  width="${aw}${u}" height="${ah}${u}" viewBox="0 0 ${aw} ${ah}">
<rect width="${aw}${u}" height="${ah}${u}" fill="white"/>
${groupedSvg}
</svg>`;
  }

  const ext = fmt === 'ai' ? 'ai' : 'svg';
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${name}.${ext}`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`${name}.${ext} をダウンロードしました`);
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ═══════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    if (selectedId) rotateRect(selectedId);
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedId && document.activeElement.tagName !== 'INPUT') {
      placed = placed.filter(p => {
        if (p.id === selectedId) { removePlacedEl(p.id); return false; }
        return true;
      });
      selectedId = null;
      hideRotateBtn();
      renderSidebar();
      updateStats();
    }
  }
  if (e.key === 'Escape') selectRect(null);
});

/* ═══════════════════════════════════════════════════════
   RESIZE: update rotate btn position on scroll
═══════════════════════════════════════════════════════ */
viewport.addEventListener('scroll', () => {
  if (selectedId) {
    const el = document.getElementById('placed-' + selectedId);
    if (el) showRotateBtn(el);
  }
});
</script>
</body>
</html>
